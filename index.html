<title>홀덤 도장 - 무료 텍사스 홀덤 연습 | AI 대결 & 전략 학습</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{width:100%;height:100%;background:#0a0f1e;color:#f0f4ff;font-family:'Noto Sans KR',system-ui,-apple-system,sans-serif;-webkit-text-size-adjust:100%;overflow:hidden;touch-action:pan-y}
button{font:inherit;cursor:pointer;border:none;outline:none;touch-action:manipulation;-webkit-user-select:none;user-select:none}
input[type=range]{-webkit-appearance:none;appearance:none}

:root{
  --bg:#0a0f1e;--bg2:#111827;--bg3:#1a2540;
  --panel:#141d2f;--border:#1e2d4a;--border2:#2a3d5e;
  --txt:#f0f4ff;--txt2:#94a3b8;--txt3:#64748b;
  --green:#10b981;--green2:#34d399;
  --yellow:#f59e0b;--yellow2:#fcd34d;
  --blue:#3b82f6;--blue2:#60a5fa;
  --red:#ef4444;--red2:#fca5a5;
  --orange:#f97316;
  --felt:#0d4a2a;--felt2:#0f5c33;--felt3:#0a3d22;
  --gold:#ffd700;
  --nav-h:60px;
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
}

/* ===== LAYOUT ===== */
#app{
  display:flex;flex-direction:column;
  height:100dvh;max-width:480px;margin:0 auto;
  position:relative;overflow:hidden;
}

/* ===== TOAST ===== */
#toast{
  position:fixed;top:calc(var(--safe-t) + 60px);left:50%;transform:translateX(-50%) translateY(-10px);
  background:rgba(16,185,129,.95);color:#fff;
  border-radius:20px;padding:8px 20px;font-size:13px;font-weight:700;
  z-index:999;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;
  white-space:nowrap;max-width:90vw;text-align:center;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.xp-popup{
  position:fixed;font-size:16px;font-weight:900;color:#fcd34d;
  z-index:998;pointer-events:none;animation:xpFloat 1.4s ease-out forwards;
  text-shadow:0 2px 8px rgba(0,0,0,.8);
}
@keyframes xpFloat{0%{opacity:1;transform:translateY(0) scale(1)}50%{opacity:1;transform:translateY(-30px) scale(1.2)}100%{opacity:0;transform:translateY(-60px) scale(.8)}}

/* ===== WIN EFFECT ===== */
.chip-fly{
  position:fixed;font-size:20px;z-index:997;pointer-events:none;
  animation:chipFly 1s ease-out forwards;
}
@keyframes chipFly{
  0%{opacity:1;transform:translate(0,0) scale(1) rotate(0deg)}
  100%{opacity:0;transform:translate(var(--tx,0),var(--ty,-80px)) scale(.5) rotate(var(--tr,360deg))}
}

/* ===== HEADER ===== */
#header{
  padding:calc(var(--safe-t) + 4px) 16px 8px;
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(180deg,rgba(10,15,30,.97) 0%,rgba(10,15,30,.8) 100%);
  position:relative;z-index:20;flex-shrink:0;
}
#header h1{font-size:17px;font-weight:900;letter-spacing:-.04em;
  background:linear-gradient(135deg,#fff 0%,#94a3b8 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  display:flex;align-items:center;gap:6px;
}
.hdr-r{display:flex;gap:8px;align-items:center}
.hdr-stat{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:4px}
#beltBadge{background:linear-gradient(135deg,var(--yellow),var(--orange));color:#000;font-weight:900;font-size:11px;border-radius:20px;padding:4px 10px;cursor:pointer;transition:transform .2s}
#beltBadge:active{transform:scale(.95)}

/* ===== TABLE ===== */
#tableWrap{
  flex:1;min-height:0;
  display:flex;flex-direction:column;
  background:radial-gradient(ellipse 90% 80% at 50% 45%,var(--felt2) 0%,var(--felt) 50%,var(--felt3) 80%,#071a0e 100%);
  position:relative;overflow:hidden;
}
#tableWrap::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 70% 60% at 50% 40%,rgba(255,255,255,.04) 0%,transparent 70%);
  pointer-events:none;z-index:0;
}
/* 테이블 테두리 느낌 */
#tableWrap::after{
  content:'';position:absolute;inset:0;
  border:2px solid rgba(255,255,255,.04);
  pointer-events:none;z-index:0;
}

/* ===== OPPONENTS ===== */
#opponents{
  display:flex;justify-content:space-around;align-items:flex-start;
  padding:6px 4px 2px;gap:2px;position:relative;z-index:1;
  flex-wrap:wrap;
}
.opp{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  min-width:0;flex:1 1 18%;max-width:80px;position:relative;
}
.opp-cards{display:flex;gap:3px;justify-content:center}
.opp-info{
  background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.1);
  border-radius:8px;padding:3px 5px;text-align:center;min-width:0;width:100%;
  transition:border-color .3s,background .3s;
}
.opp.active .opp-info{border-color:var(--yellow);background:rgba(245,158,11,.15);
  box-shadow:0 0 12px rgba(245,158,11,.2);}
.opp-name{font-size:9px;font-weight:800;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.opp-role{font-size:9px;color:var(--yellow2);font-weight:700}
.opp-stack{font-size:11px;font-weight:900;color:var(--green2)}
.opp-style{font-size:8px;color:var(--txt3);margin-top:1px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.opp-action{font-size:9px;color:var(--txt2);margin-top:1px;min-height:12px;font-weight:700}
.opp-action.act-fold{color:#ef4444}
.opp-action.act-call{color:#60a5fa}
.opp-action.act-raise{color:#f59e0b}
.opp-action.act-check{color:#6ee7b7}
.opp-action.act-allin{color:#f97316}
.opp.folded{opacity:.3}
.opp.eliminated{opacity:.15;pointer-events:none;filter:grayscale(1)}
.opp.eliminated .opp-stack{color:#ef4444!important}
.opp.eliminated .opp-name::after{content:' ❌';font-size:8px}

/* Tournament Bar */
.tournament-bar{display:flex;justify-content:center;gap:12px;padding:4px 8px;background:linear-gradient(135deg,rgba(245,158,11,.15),rgba(239,68,68,.1));border-bottom:1px solid rgba(245,158,11,.2);font-size:10px;font-weight:700}
.ti-players{color:#60a5fa}
.ti-blind{color:#fcd34d}
.ti-next{color:#94a3b8}

/* Game Over Overlay */
#gameOverOverlay,#championOverlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:9999;justify-content:center;align-items:center;padding:20px}
.go-card,.champ-card{background:linear-gradient(145deg,#1a2540,#111827);border:2px solid var(--border2);border-radius:20px;padding:28px 24px;max-width:360px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.6)}
.go-emoji,.champ-emoji{font-size:56px;margin-bottom:8px}
.go-title{font-size:24px;font-weight:900;color:#f87171;margin-bottom:4px}
.champ-title{font-size:24px;font-weight:900;color:#fcd34d;margin-bottom:4px}
.go-sub,.champ-sub{font-size:13px;color:var(--txt2);margin-bottom:16px}
.go-stats,.champ-stats{background:var(--bg3);border-radius:12px;padding:12px;margin-bottom:16px;font-size:12px;color:var(--txt2);line-height:1.8}
.champ-xp{font-size:20px;font-weight:900;color:#fcd34d;margin-bottom:16px}
.go-recharge{margin-top:12px}
.go-recharge-title{font-size:14px;font-weight:800;color:var(--txt);margin-bottom:12px}
.go-btn{display:block;width:100%;padding:14px;border:none;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;margin-bottom:8px}
.go-share{background:linear-gradient(135deg,#10b981,#059669);color:#fff}
.go-wait{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff}
.go-or{font-size:11px;color:var(--txt3);margin:8px 0}
.go-timer{font-size:13px;color:var(--yellow2);font-weight:700;margin-bottom:8px}
.champ-share{margin-bottom:12px}
.opp.winner-glow .opp-info{border-color:var(--gold);box-shadow:0 0 16px rgba(255,215,0,.4)}
.dealer-btn{
  position:absolute;top:-6px;right:2px;
  background:var(--yellow);color:#000;
  width:20px;height:20px;border-radius:50%;
  font-size:9px;font-weight:900;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 6px rgba(0,0,0,.5);z-index:2;
  border:2px solid rgba(0,0,0,.3);
}
.sb-badge,.bb-badge{
  position:absolute;top:-6px;
  width:20px;height:20px;border-radius:50%;
  font-size:8px;font-weight:900;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 6px rgba(0,0,0,.5);z-index:2;
  border:2px solid rgba(0,0,0,.3);
}
.sb-badge{right:24px;background:#60a5fa;color:#fff;}
.bb-badge{right:46px;background:#f87171;color:#fff;}
.opp-bet{
  position:absolute;bottom:-12px;left:50%;transform:translateX(-50%);
  background:var(--yellow);color:#000;
  border-radius:10px;padding:2px 6px;font-size:9px;font-weight:900;
  white-space:nowrap;display:none;z-index:3;
}
.opp-bet.show{display:block}

/* ===== BOARD ===== */
#boardArea{
  flex:1;min-height:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:4px 12px 8px;gap:8px;position:relative;z-index:1;
}
#potDisplay{
  background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.18);
  border-radius:20px;padding:5px 18px;font-size:13px;font-weight:900;
  display:flex;align-items:center;gap:6px;
  transition:transform .3s;
}
.pot-label{color:var(--txt2);font-size:10px;font-weight:700}
#potVal{color:var(--yellow2);font-size:16px}
#boardCards{display:flex;gap:6px;justify-content:center;align-items:center;min-height:76px}
.board-slot{
  width:50px;height:72px;
  border:2px dashed rgba(255,255,255,.15);
  border-radius:8px;background:rgba(0,0,0,.15);
}
#streetLabel{font-size:11px;font-weight:700;color:var(--txt3);letter-spacing:.1em}

/* ===== CARDS ===== */
.card{
  width:50px;height:72px;
  background:#fff;border-radius:8px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(0,0,0,.7),0 1px 3px rgba(0,0,0,.3);
  position:relative;overflow:hidden;flex-shrink:0;
}
.card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.3) 0%,transparent 55%);
  pointer-events:none;
}
.card .rank{font-size:22px;font-weight:900;line-height:1}
.card .rank.r10{font-size:18px}
#heroCards .card .rank.r10{font-size:20px}
#boardCards .card .rank.r10{font-size:18px}
.card.sm .rank.r10{font-size:12px}
.sp-7cards .card.sm .rank.r10{font-size:11px}
.card .suit{font-size:18px;line-height:1;margin-top:1px}
/* 4-color deck: 각 무늬별 고유 색상으로 초보자도 쉽게 구분 */
.card.suit-spade .rank,.card.suit-spade .suit{color:#1a1a2e}
.card.suit-heart .rank,.card.suit-heart .suit{color:#dc2626}
.card.suit-diamond .rank,.card.suit-diamond .suit{color:#ea580c}
.card.suit-club .rank,.card.suit-club .suit{color:#16a34a}
.card.back{
  background:linear-gradient(135deg,#1e3a5f 0%,#0f2040 100%);
  border:1px solid rgba(255,255,255,.1);
}
.card.back::before{
  content:'';position:absolute;inset:4px;
  border:1px solid rgba(255,255,255,.15);border-radius:4px;
  background:repeating-linear-gradient(45deg,transparent,transparent 3px,rgba(255,255,255,.04) 3px,rgba(255,255,255,.04) 6px);
}
.card.back .rank{display:none}
.card.back .suit{font-size:18px;color:rgba(255,255,255,.25)}
.card.sm{width:38px;height:54px}
.card.sm .rank{font-size:15px}
.card.sm .suit{font-size:12px}
.card.win{
  box-shadow:0 0 0 3px var(--yellow),0 4px 20px rgba(245,158,11,.6);
  transform:translateY(-5px);
  animation:winPulse 1.5s ease-in-out infinite;
}
@keyframes winPulse{0%,100%{box-shadow:0 0 0 3px var(--yellow),0 4px 20px rgba(245,158,11,.4)}50%{box-shadow:0 0 0 4px var(--yellow),0 4px 28px rgba(245,158,11,.8)}}
.card.deal{animation:cardDeal .4s cubic-bezier(.175,.885,.32,1.275)}
@keyframes cardDeal{
  from{opacity:0;transform:scale(.5) rotate(-12deg) translateY(-20px)}
  to{opacity:1;transform:scale(1) rotate(0) translateY(0)}
}
/* 히어로 카드 크게 */
/* 현재 패 표시 (게임 중) */
#currentHandBadge{
  font-size:10px;font-weight:800;color:var(--yellow2);
  background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.3);
  border-radius:10px;padding:2px 8px;display:inline-block;
}
#heroCards .card{width:56px;height:78px}
#heroCards .card .rank{font-size:24px}
#heroCards .card .suit{font-size:18px}
/* 보드 카드 크게 */
#boardCards .card{width:50px;height:72px}
#boardCards .card .rank{font-size:22px}
#boardCards .card .suit{font-size:18px}
/* 결과 화면 보드 카드 */
.result-board-cards .card{width:52px;height:74px}
.result-board-cards .card .rank{font-size:22px}
.result-board-cards .card .suit{font-size:18px}

/* ===== HERO AREA ===== */
#heroArea{
  background:rgba(0,0,0,.6);backdrop-filter:blur(12px);
  border-top:1px solid rgba(255,255,255,.1);
  padding:6px 10px 4px;
  display:flex;align-items:center;justify-content:space-between;gap:6px;
  position:relative;z-index:5;flex-shrink:0;
}
#heroCards{display:flex;gap:8px;align-items:center;position:relative}
#heroInfo{flex:1;min-width:0}
#heroHandLabel{font-size:13px;font-weight:900;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#heroMade{font-size:11px;color:var(--txt2);margin-top:2px}
#heroStack{text-align:right}
.stack-val{font-size:18px;font-weight:900;color:var(--yellow2)}
.stack-label{font-size:9px;color:var(--txt2);font-weight:700}

/* ===== ACTION DOCK ===== */
#actionDock{
  background:var(--bg2);border-top:1px solid var(--border);
  padding:8px 12px;
  padding-bottom:calc(8px + var(--safe-b));
  flex-shrink:0;position:relative;z-index:10;
}
#streetInfo{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
#streetBadge{
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:20px;padding:4px 12px;
  font-size:11px;font-weight:900;color:var(--blue2);letter-spacing:.05em;
}
#callInfo{font-size:12px;color:var(--txt2);font-weight:700}
#callInfo span{color:var(--yellow2);font-weight:900}

/* Coach tip */
#coachTip{
  background:var(--bg3);border:1px solid var(--border2);
  border-left:3px solid var(--green);
  border-radius:8px;padding:8px 12px;margin-bottom:8px;
  font-size:12px;line-height:1.5;color:#d1fae5;
  display:flex;gap:8px;align-items:flex-start;
}
#coachTip strong{color:#fff}

/* Bet slider */
#betSliderWrap{
  display:none;background:var(--bg3);border:1px solid var(--border2);
  border-radius:10px;padding:8px 12px;margin-bottom:8px;
  gap:8px;align-items:center;
}
#betSliderWrap.show{display:flex}
#betSlider{flex:1;height:4px;background:var(--border2);border-radius:4px;accent-color:var(--yellow)}
#betSlider::-webkit-slider-thumb{width:22px;height:22px;border-radius:50%;background:var(--yellow);cursor:pointer;-webkit-appearance:none}
#betAmt{font-size:14px;font-weight:900;color:var(--yellow2);min-width:50px;text-align:right}

/* 빠른 베팅 버튼 */
#quickBets{display:flex;gap:4px;margin-bottom:6px}
.qbet{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:5px 4px;font-size:10px;font-weight:700;color:var(--txt2);transition:background .2s,color .2s}
.qbet:active{background:var(--border2);color:#fff}

/* Action buttons */
#actionBtns{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px}
.act-btn{
  border-radius:14px;padding:12px 6px;font-weight:900;font-size:15px;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  transition:transform .1s,opacity .1s,box-shadow .2s;min-height:58px;
  position:relative;overflow:hidden;
}
.act-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.12) 0%,transparent 50%);pointer-events:none}
.act-btn:active{transform:scale(.93)}
.act-btn:disabled{opacity:.3;pointer-events:none}
.act-btn small{font-size:10px;font-weight:700;opacity:.85}
#foldBtn{background:linear-gradient(135deg,#374151,#1f2937);color:#9ca3af}
#checkBtn{background:linear-gradient(135deg,#f8fafc,#e2e8f0);color:#1e293b}
#callBtn{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff}
#betBtn{background:linear-gradient(135deg,#ea580c,#c2410c);color:#fff}
#nextBtn{
  display:none;width:100%;border-radius:14px;padding:16px;
  background:linear-gradient(135deg,var(--green),#059669);color:#fff;
  font-size:16px;font-weight:900;margin-top:6px;
  animation:nextPulse 2s ease-in-out infinite;letter-spacing:.5px;
}
#nextBtn.show{display:block}
@keyframes nextPulse{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.4)}50%{box-shadow:0 0 0 6px rgba(16,185,129,0)}}

/* ===== BOTTOM NAV ===== */
#bottomNav{
  display:flex;background:var(--bg2);border-top:1px solid var(--border);
  padding-bottom:var(--safe-b);flex-shrink:0;z-index:20;
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:8px 4px;background:none;color:var(--txt3);font-size:10px;font-weight:700;
  transition:color .2s;
}
.nav-btn.active{color:var(--green2)}
.nav-ico{font-size:20px;display:block}

/* ===== PANELS ===== */
#panelOverlay{
  position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:40;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
#panelOverlay.show{opacity:1;pointer-events:auto}
#panels{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);
  width:100%;max-width:480px;
  background:var(--panel);border-radius:24px 24px 0 0;
  border-top:1px solid var(--border2);
  z-index:50;transition:transform .35s cubic-bezier(.32,1,.32,1);
  max-height:80dvh;display:flex;flex-direction:column;
}
#panels.open{transform:translateX(-50%) translateY(0)}
#panelHandle{width:40px;height:4px;background:var(--border2);border-radius:4px;margin:12px auto 0}
#panelTitle{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px;border-bottom:1px solid var(--border);flex-shrink:0;
}
#panelTitleText{font-size:16px;font-weight:900;color:#fff}
#panelClose{background:var(--bg3);border:1px solid var(--border2);border-radius:50%;width:32px;height:32px;color:var(--txt2);font-size:16px;display:flex;align-items:center;justify-content:center}
#panelContent{overflow-y:auto;padding:16px 16px 32px;flex:1;-webkit-overflow-scrolling:touch}

/* Panel content styles */
.section-title{font-size:13px;font-weight:900;color:var(--txt3);letter-spacing:.08em;text-transform:uppercase;margin:16px 0 8px;padding-left:4px}
.section-title:first-child{margin-top:0}
.learn-card{background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:14px;margin-bottom:10px}
.learn-card h3{font-size:13px;font-weight:900;color:#fff;margin-bottom:6px}
.learn-card p{font-size:12px;line-height:1.7;color:var(--txt2)}
.learn-card p strong{color:#fff}
.hand-rank-table{width:100%;border-collapse:collapse;font-size:12px}
.hand-rank-table tr{border-bottom:1px solid var(--border)}
.hand-rank-table td{padding:6px 4px;color:var(--txt2)}
.hand-rank-table td:first-child{color:var(--yellow2);font-weight:900;width:24px}
.hand-rank-table td:nth-child(2){color:#fff;font-weight:700}

/* Hand chart */
.hand-chart{display:grid;grid-template-columns:repeat(13,1fr);gap:1.5px;font-size:7px;font-weight:700}
.hc-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:2px;color:rgba(255,255,255,.8)}
.hc-cell.premium{background:#16a34a}
.hc-cell.strong{background:#2563eb}
.hc-cell.playable{background:#7c3aed}
.hc-cell.marginal{background:#92400e}
.hc-cell.fold{background:#1f2937;color:rgba(255,255,255,.2)}
.hc-label{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.hc-legend{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--txt2)}
.hc-legend-dot{width:10px;height:10px;border-radius:2px}

/* Quiz */
.quiz-tag{display:inline-block;background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:3px 10px;font-size:10px;font-weight:700;color:var(--blue2);margin-bottom:10px}
.quiz-q{font-size:14px;font-weight:800;color:#fff;line-height:1.5;margin-bottom:14px}
.quiz-opts{display:flex;flex-direction:column;gap:8px}
.quiz-opt{
  background:var(--bg3);border:1px solid var(--border2);border-radius:10px;
  padding:12px 14px;text-align:left;font-size:13px;font-weight:700;color:var(--txt2);
  transition:background .2s,border-color .2s,color .2s;
}
.quiz-opt:active{background:var(--border2)}
.quiz-opt.correct{background:rgba(16,185,129,.2);border-color:var(--green);color:#fff}
.quiz-opt.wrong{background:rgba(239,68,68,.15);border-color:var(--red);color:var(--red2)}
.quiz-why{
  background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);
  border-radius:10px;padding:10px 12px;font-size:12px;color:#d1fae5;
  line-height:1.6;margin-top:10px;display:none;
}
.quiz-why.show{display:block}
#quizNextBtn{
  display:none;width:100%;margin-top:12px;border-radius:10px;padding:12px;
  background:var(--blue);color:#fff;font-size:13px;font-weight:900;
}
#quizNextBtn.show{display:block}
.quiz-progress{font-size:11px;color:var(--txt3);text-align:center;margin-top:10px}

/* Growth */
.belt-progress{background:var(--bg3);border:1px solid var(--border2);border-radius:12px;padding:14px;margin-bottom:10px}
.bp-bar{height:8px;background:var(--border);border-radius:4px;margin:8px 0;overflow:hidden}
.bp-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--yellow),var(--orange));transition:width .6s ease}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.stat-box{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:12px;text-align:center}
.stat-num{font-size:22px;font-weight:900;color:var(--yellow2)}
.stat-lbl{font-size:10px;color:var(--txt3);font-weight:700;margin-top:2px}
.mission-item{
  background:var(--bg3);border:1px solid var(--border2);border-radius:10px;
  padding:12px;display:flex;align-items:center;gap:10px;margin-bottom:8px;
}
.mission-ico{font-size:20px;flex-shrink:0}
.mission-info{flex:1;min-width:0}
.mission-name{font-size:12px;font-weight:800;color:#fff}
.mission-desc{font-size:10px;color:var(--txt2);margin-top:2px}
.mission-prog{font-size:11px;font-weight:900;color:var(--yellow2);flex-shrink:0}
.mission-done{color:var(--green2)!important}

/* Review */
.review-item{
  background:var(--bg3);border:1px solid var(--border2);border-radius:10px;
  padding:10px 12px;margin-bottom:8px;
  display:flex;align-items:center;gap:10px;
}
.rv-result{font-size:18px;flex-shrink:0}
.rv-info{flex:1;min-width:0}
.rv-hand{font-size:12px;font-weight:900;color:#fff}
.rv-board{font-size:10px;color:var(--txt2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rv-tier{font-size:10px;font-weight:700;border-radius:6px;padding:2px 6px;background:var(--bg);color:var(--txt3);flex-shrink:0}

/* ===== RESULT OVERLAY ===== */
#resultOverlay{
  position:fixed;inset:0;z-index:60;
  display:none;flex-direction:column;align-items:center;justify-content:flex-end;
  background:rgba(0,0,0,.85);backdrop-filter:blur(10px);
  padding:0 0 calc(var(--safe-b) + 10px);
}
#resultOverlay.show{display:flex}
#resultCard{
  background:var(--panel);border:1px solid var(--border2);
  border-radius:24px 24px 0 0;padding:24px 20px;width:100%;max-width:480px;
  max-height:85dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;
  animation:slideUp .4s cubic-bezier(.32,1,.32,1);
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.result-emoji{font-size:44px;text-align:center;margin-bottom:6px;animation:bounceIn .5s cubic-bezier(.175,.885,.32,1.275)}
@keyframes bounceIn{0%{transform:scale(.3)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
.result-title{font-size:22px;font-weight:900;text-align:center;margin-bottom:4px;line-height:1.3}
.result-sub{font-size:12px;font-weight:700;color:var(--txt2);text-align:center;margin-bottom:4px}
.result-xp{text-align:center;margin-bottom:14px}
.result-xp span{background:rgba(245,158,11,.2);border:1px solid rgba(245,158,11,.4);border-radius:20px;padding:4px 14px;font-size:13px;font-weight:900;color:var(--yellow2)}
.result-board{margin-bottom:12px}
.result-board-label{font-size:11px;font-weight:700;color:var(--txt3);margin-bottom:6px;text-align:center}
.result-board-cards{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.showdown-wrap{margin-bottom:12px}
.showdown-title{font-size:12px;font-weight:700;color:var(--yellow2);letter-spacing:.08em;margin-bottom:8px}
/* 7장 전체 표시 레이아웃 */
.sp-7cards{
  display:flex;align-items:center;gap:4px;margin-top:6px;
}
.sp-hole,.sp-board{display:flex;flex-direction:column;align-items:center;gap:2px}
.sp-hole .sp-cards,.sp-board .sp-cards{display:flex;gap:2px}
.sp-7cards .card.sm{width:34px;height:48px}
.sp-7cards .card.sm .rank{font-size:13px}
.sp-7cards .card.sm .suit{font-size:10px}
.sp-label{font-size:8px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.05em}
.sp-plus{font-size:14px;font-weight:900;color:var(--txt3);margin:0 2px;align-self:center;margin-top:12px}
.sd-explain{
  background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.3);border-radius:8px;
  padding:8px 12px;margin-bottom:10px;font-size:12px;font-weight:700;color:var(--blue2);
  text-align:center;line-height:1.5;
}
.showdown-player{
  background:var(--bg3);border:1px solid var(--border2);border-radius:10px;
  padding:10px;margin-bottom:6px;
}
.showdown-player.winner{border-color:var(--gold);background:rgba(255,215,0,.08)}
.sp-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.sp-name{font-size:12px;font-weight:900;color:#fff}
.sp-hand-name{font-size:11px;font-weight:700;color:var(--yellow2);background:rgba(245,158,11,.15);border-radius:6px;padding:2px 6px}
.sp-cards{display:flex;gap:4px;flex-wrap:wrap}
.result-coach{
  background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);
  border-radius:10px;padding:10px 12px;font-size:12px;color:#d1fae5;
  line-height:1.6;margin-bottom:12px;
}
.result-coach strong{color:#fff}
#resultNextBtn{
  width:100%;border-radius:12px;padding:14px;
  background:linear-gradient(135deg,var(--green),#059669);color:#fff;
  font-size:15px;font-weight:900;
}

/* ===== SPONSOR CARD ===== */
.sponsor-card{
  background:linear-gradient(135deg,#1a2e1a,#0f2010);
  border:1px solid rgba(16,185,129,.3);
  border-radius:12px;padding:14px;margin-bottom:12px;
  position:relative;overflow:hidden;
}
.sponsor-card::before{
  content:'';position:absolute;top:0;right:0;width:60px;height:60px;
  background:radial-gradient(circle,rgba(16,185,129,.15),transparent);
}
.sponsor-label{font-size:9px;font-weight:700;color:var(--green2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;opacity:.7}
.sponsor-title{font-size:14px;font-weight:900;color:#fff;margin-bottom:4px;line-height:1.3}
.sponsor-desc{font-size:11px;color:var(--txt2);line-height:1.5;margin-bottom:10px}
.sponsor-cta{
  display:inline-flex;align-items:center;gap:6px;
  background:linear-gradient(135deg,var(--green),#059669);
  color:#fff;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:900;
  text-decoration:none;transition:transform .2s,box-shadow .2s;
}
.sponsor-cta:active{transform:scale(.96)}
.sponsor-cta-ghost{
  display:inline-flex;align-items:center;gap:6px;
  background:transparent;border:1px solid rgba(16,185,129,.4);
  color:var(--green2);border-radius:8px;padding:7px 12px;font-size:11px;font-weight:700;
  text-decoration:none;margin-left:8px;
}

/* ===== TUTORIAL ===== */
#tutorialOverlay{
  position:fixed;inset:0;z-index:80;
  display:none;flex-direction:column;align-items:center;justify-content:flex-end;
  background:rgba(0,0,0,.8);backdrop-filter:blur(8px);
  padding:20px;padding-bottom:calc(20px + var(--safe-b));
}
#tutorialOverlay.show{display:flex}
.tutorial-card{
  background:var(--panel);border:1px solid var(--border2);
  border-radius:24px;padding:24px;width:100%;max-width:360px;
  animation:slideUp .4s ease;
}
.tut-step{font-size:11px;color:var(--txt3);margin-bottom:6px}
.tut-title{font-size:18px;font-weight:900;margin-bottom:10px;color:#fff}
.tut-body{font-size:13px;line-height:1.7;color:var(--txt2)}
.tut-body strong{color:#fff}
.tut-btns{display:flex;gap:10px;margin-top:18px}
.tut-skip{flex:0;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--txt2);font-size:13px;font-weight:700}
.tut-next{flex:1;background:var(--blue);border-radius:12px;padding:12px;color:#fff;font-size:14px;font-weight:900}

/* ===== LOADING ===== */
#loadingScreen{
  position:fixed;inset:0;z-index:200;
  background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;
  transition:opacity .5s;
}
#loadingScreen.fade{opacity:0;pointer-events:none}
.loading-logo{font-size:52px;animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
.loading-text{font-size:17px;font-weight:900;color:#fff}
.loading-sub{font-size:12px;color:var(--txt3)}
.loading-sponsor{
  position:absolute;bottom:calc(var(--safe-b) + 24px);
  background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);
  border-radius:12px;padding:10px 16px;text-align:center;width:calc(100% - 48px);max-width:320px;
}
.loading-sponsor-txt{font-size:11px;color:var(--green2);font-weight:700}
.loading-sponsor-sub{font-size:10px;color:var(--txt3);margin-top:2px}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* ===== OUTS CALCULATOR ===== */

<script>
(function(){'use strict';

// ===== CONSTANTS =====
var SUITS=['♠','♥','♦','♣'];
var RANKS=['2','3','4','5','6','7','8','9','T','J','Q','K','A'];
var RANK_VAL={};RANKS.forEach(function(r,i){RANK_VAL[r]=i+2});
var STORE='holdem_dojo_v8';
var AI_NAMES=['AI 민준','AI 서아','AI 도윤','AI 하은','AI 시우'];
var AI_STYLES=['TAG','LAG','TIGHT','LAG','TAG']; // 6-max: 다양한 스타일 배치
var AI_STYLE_DESC={
  'TAG':{label:'타이트 공격형',emoji:'🎯',desc:'강한 패만 플레이하고 공격적으로 베팅',hint:'이 플레이어가 레이즈하면 강한 패일 확률 높음'},
  'LAG':{label:'루즈 공격형',emoji:'🔥',desc:'다양한 패로 공격적으로 플레이. 블러프 빈도 높음',hint:'레이즈해도 블러프일 수 있음. 콜로 트랩 가능'},
  'TIGHT':{label:'타이트 수비형',emoji:'🛡️',desc:'매우 신중하게 플레이. 강한 패가 아니면 폴드',hint:'이 플레이어가 콜만 해도 괜찮은 패를 가진 것'}
};
var BELT_XP=[0,200,600,1400,2800,5000];
var BELT_NAMES=['흰띠','노란띠','초록띠','파란띠','빨간띠','검은띠'];
var BELT_COLORS=['#e5e7eb','#fcd34d','#34d399','#60a5fa','#f87171','#374151'];

// ===== SOUND SYSTEM =====
var audioCtx=null;
function getAudioCtx(){
  if(!audioCtx){
    try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
  }
  if(audioCtx&&audioCtx.state==='suspended'){audioCtx.resume();}
  return audioCtx;
}
var soundEnabled=true;
function playSound(type){
  if(!soundEnabled)return;
  try{
    var ctx=getAudioCtx();
    var now=ctx.currentTime;
    var osc,gain;
    switch(type){
      case 'card': // 카드 딜링 - 짧은 틱
        osc=ctx.createOscillator();gain=ctx.createGain();
        osc.type='sine';osc.frequency.setValueAtTime(800,now);
        osc.frequency.exponentialRampToValueAtTime(400,now+0.06);
        gain.gain.setValueAtTime(0.15,now);
        gain.gain.exponentialRampToValueAtTime(0.001,now+0.08);
        osc.connect(gain);gain.connect(ctx.destination);
        osc.start(now);osc.stop(now+0.08);
        break;
      case 'chip': // 칩 베팅 - 딸깍
        osc=ctx.createOscillator();gain=ctx.createGain();
        osc.type='square';osc.frequency.setValueAtTime(2000,now);
        osc.frequency.exponentialRampToValueAtTime(800,now+0.05);
        gain.gain.setValueAtTime(0.08,now);
        gain.gain.exponentialRampToValueAtTime(0.001,now+0.07);
        osc.connect(gain);gain.connect(ctx.destination);
        osc.start(now);osc.stop(now+0.07);
        // 두번째 딸깍
        var osc2=ctx.createOscillator();var gain2=ctx.createGain();
        osc2.type='square';osc2.frequency.setValueAtTime(1600,now+0.04);
        osc2.frequency.exponentialRampToValueAtTime(600,now+0.09);
        gain2.gain.setValueAtTime(0.06,now+0.04);
        gain2.gain.exponentialRampToValueAtTime(0.001,now+0.11);
        osc2.connect(gain2);gain2.connect(ctx.destination);
        osc2.start(now+0.04);osc2.stop(now+0.11);
        break;
      case 'check': // 체크 - 톡
        osc=ctx.createOscillator();gain=ctx.createGain();
        osc.type='sine';osc.frequency.setValueAtTime(500,now);
        gain.gain.setValueAtTime(0.1,now);
        gain.gain.exponentialRampToValueAtTime(0.001,now+0.05);
        osc.connect(gain);gain.connect(ctx.destination);
        osc.start(now);osc.stop(now+0.05);
        break;
      case 'fold': // 폴드 - 낮은 톤
        osc=ctx.createOscillator();gain=ctx.createGain();
        osc.type='sine';osc.frequency.setValueAtTime(300,now);
        osc.frequency.exponentialRampToValueAtTime(150,now+0.15);
        gain.gain.setValueAtTime(0.1,now);
        gain.gain.exponentialRampToValueAtTime(0.001,now+0.15);
        osc.connect(gain);gain.connect(ctx.destination);
        osc.start(now);osc.stop(now+0.15);
        break;
      case 'allin': // 올인 - 긴장감
        for(var i=0;i<3;i++){
          (function(i){
            var o=ctx.createOscillator();var g=ctx.createGain();
            o.type='sawtooth';o.frequency.setValueAtTime(400+i*200,now+i*0.08);
            g.gain.setValueAtTime(0.08,now+i*0.08);
            g.gain.exponentialRampToValueAtTime(0.001,now+i*0.08+0.12);
            o.connect(g);g.connect(ctx.destination);
            o.start(now+i*0.08);o.stop(now+i*0.08+0.12);
          })(i);
        }
        break;
      case 'win': // 승리 - 상승 멜로디
        var notes=[523,659,784,1047];
        notes.forEach(function(freq,i){
          var o=ctx.createOscillator();var g=ctx.createGain();
          o.type='sine';o.frequency.setValueAtTime(freq,now+i*0.12);
          g.gain.setValueAtTime(0.12,now+i*0.12);
          g.gain.exponentialRampToValueAtTime(0.001,now+i*0.12+0.2);
          o.connect(g);g.connect(ctx.destination);
          o.start(now+i*0.12);o.stop(now+i*0.12+0.2);
        });
        break;
      case 'lose': // 패배 - 하강
        var lnotes=[400,350,300,200];
        lnotes.forEach(function(freq,i){
          var o=ctx.createOscillator();var g=ctx.createGain();
          o.type='sine';o.frequency.setValueAtTime(freq,now+i*0.15);
          g.gain.setValueAtTime(0.1,now+i*0.15);
          g.gain.exponentialRampToValueAtTime(0.001,now+i*0.15+0.2);
          o.connect(g);g.connect(ctx.destination);
          o.start(now+i*0.15);o.stop(now+i*0.15+0.2);
        });
        break;
      case 'eliminate': // 탈락
        osc=ctx.createOscillator();gain=ctx.createGain();
        osc.type='sawtooth';osc.frequency.setValueAtTime(600,now);
        osc.frequency.exponentialRampToValueAtTime(100,now+0.4);
        gain.gain.setValueAtTime(0.1,now);
        gain.gain.exponentialRampToValueAtTime(0.001,now+0.4);
        osc.connect(gain);gain.connect(ctx.destination);
        osc.start(now);osc.stop(now+0.4);
        break;
      case 'champion': // 우승 팡파레
        var cfn=[523,659,784,659,784,1047];
        cfn.forEach(function(freq,i){
          var o=ctx.createOscillator();var g=ctx.createGain();
          o.type='triangle';o.frequency.setValueAtTime(freq,now+i*0.15);
          g.gain.setValueAtTime(0.15,now+i*0.15);
          g.gain.exponentialRampToValueAtTime(0.001,now+i*0.15+0.25);
          o.connect(g);g.connect(ctx.destination);
          o.start(now+i*0.15);o.stop(now+i*0.15+0.25);
        });
        break;
      case 'blindup': // 블라인드 상승
        osc=ctx.createOscillator();gain=ctx.createGain();
        osc.type='triangle';osc.frequency.setValueAtTime(440,now);
        osc.frequency.linearRampToValueAtTime(880,now+0.3);
        gain.gain.setValueAtTime(0.1,now);
        gain.gain.exponentialRampToValueAtTime(0.001,now+0.35);
        osc.connect(gain);gain.connect(ctx.destination);
        osc.start(now);osc.stop(now+0.35);
        break;
    }
  }catch(e){}
}

// ===== STATE =====
var deck=[],board=[],street='preflop',pot=0,currentBet=0,handOver=false;
var players=[],dealer=0,smallBlindSeat=1,bigBlindSeat=2,handCount=0,betAmount=60;
var quizIdx=0;
var currentPanel=null,tutStep=0;
var progress=loadProgress();
var sponsorShownCount=0;

// ===== HERO BEHAVIOR TRACKER (AI 블러프 캐치용) =====
var heroAggroTracker={allins:0,raises:0,hands:0,folds:0,checks:0,calls:0,bluffsCaught:0,bluffsSucceeded:0};
var heroPositionStats={BTN:{hands:0,raises:0},SB:{hands:0,raises:0},BB:{hands:0,raises:0},UTG:{hands:0,raises:0},HJ:{hands:0,raises:0},CO:{hands:0,raises:0}};
function trackHeroAction(action,pos){
  heroAggroTracker.hands++;
  if(pos)heroPositionStats[pos].hands++;
  if(action==='allin'){heroAggroTracker.allins++;if(pos)heroPositionStats[pos].raises++;}
  else if(action==='raise'||action==='bet'){heroAggroTracker.raises++;if(pos)heroPositionStats[pos].raises++;}
  else if(action==='fold')heroAggroTracker.folds++;
  else if(action==='check')heroAggroTracker.checks++;
  else if(action==='call')heroAggroTracker.calls++;
}
function getHeroPositionAggro(pos){
  var s=heroPositionStats[pos]||{hands:0,raises:0};
  return s.hands<3?0.4:s.raises/s.hands;
}
function getHeroOverallAggro(){
  if(heroAggroTracker.hands<5)return 0.4;
  return(heroAggroTracker.allins*2+heroAggroTracker.raises)/(heroAggroTracker.hands);
}
// trackHeroAction is now defined above with position support
function getHeroAggroFactor(){
  if(heroAggroTracker.hands<5)return 0.5;
  return(heroAggroTracker.allins*2+heroAggroTracker.raises)/heroAggroTracker.hands;
}
function getHeroReadImpact(p){
  if(aiDifficulty==='easy'||aiDifficulty==='normal')return 0;
  var heroAggro=getHeroOverallAggro();
  var pos=getAIPosition(players.indexOf(p));
  var posAggro=getHeroPositionAggro(pos);
  var baseRead=heroAggro*0.3+posAggro*0.2;
  // 전문가 AI: 히어로가 매우 어그로면 블러프 캐치 증가, 매우 패시브면 블러프 증가
  if(heroAggro>0.6)baseRead+=0.15; // 히어로가 자주 레이즈 → 진짜 강한 패일 때만 콜
  if(heroAggro<0.25)baseRead-=0.10; // 히어로가 매우 패시브 → 블러프 더 많이
  return Math.max(-0.15,Math.min(0.20,baseRead));
}

// ===== TOURNAMENT SYSTEM =====
var BLIND_LEVELS=[
  {sb:10,bb:20},
  {sb:20,bb:40},
  {sb:30,bb:60},
  {sb:50,bb:100},
  {sb:75,bb:150},
  {sb:100,bb:200}
];
var HANDS_PER_LEVEL=10;
var INIT_STACK=1000;
var RECHARGE_WAIT_MS=30*60*1000; // 30분
var tournamentHand=0; // 현재 토너먼트 내 핸드 수
var eliminatedPlayers=[]; // 탈락한 플레이어 인덱스

function getBlindLevel(){
  var lvl=Math.floor(tournamentHand/HANDS_PER_LEVEL);
  return BLIND_LEVELS[Math.min(lvl,BLIND_LEVELS.length-1)];
}
function getBlindLevelIdx(){
  return Math.min(Math.floor(tournamentHand/HANDS_PER_LEVEL),BLIND_LEVELS.length-1);
}
function activePlayers(){
  return players.filter(function(p){return eliminatedPlayers.indexOf(players.indexOf(p))<0});
}
function activePlayerCount(){
  return players.length-eliminatedPlayers.length;
}
function isEliminated(idx){
  return eliminatedPlayers.indexOf(idx)>=0;
}
function nextActiveSeat(from){
  var N=players.length;
  var idx=from;
  for(var step=0;step<N;step++){
    idx=(idx+1)%N;
    if(!isEliminated(idx))return idx;
  }
  return from;
}
function getPositionLabel(idx){
  // 6-max position labels (Hero + 5 AI)
  if(idx===dealer)return'BTN';
  if(idx===smallBlindSeat)return idx===dealer?'BTN/SB':'SB';
  if(idx===bigBlindSeat)return'BB';
  // Find positions between BB and BTN
  var order=[];
  var cur=nextActiveSeat(bigBlindSeat);
  var safety=0;
  while(cur!==dealer&&safety<10){
    if(cur!==smallBlindSeat&&cur!==bigBlindSeat)order.push(cur);
    cur=nextActiveSeat(cur);
    safety++;
  }
  var labels=['UTG','HJ','CO'];
  var pos=order.indexOf(idx);
  return labels[pos]||'MP';
}

// ===== HAND EVALUATION =====
function combos(cs){
  var o=[];
  for(var a=0;a<cs.length-4;a++)
    for(var b=a+1;b<cs.length-3;b++)
      for(var c=b+1;c<cs.length-2;c++)
        for(var d=c+1;d<cs.length-1;d++)
          for(var e=d+1;e<cs.length;e++)
            o.push([cs[a],cs[b],cs[c],cs[d],cs[e]]);
  return o;
}
function straightTop(vals){
  var u=[];
  vals.slice().sort(function(a,b){return b-a}).forEach(function(v){if(u.indexOf(v)<0)u.push(v)});
  if(u.indexOf(14)>-1)u.push(1);
  for(var i=0;i<=u.length-5;i++){
    var sl=u.slice(i,i+5);
    if(sl[0]-sl[4]===4)return sl[0]===1?5:sl[0];
  }
  return 0;
}
function eval5(cs){
  var vals=cs.map(function(c){return c.v}).sort(function(a,b){return b-a});
  var fl=cs.every(function(c){return c.s===cs[0].s});
  var st=straightTop(vals);
  var cnt={};vals.forEach(function(v){cnt[v]=(cnt[v]||0)+1});
  var groups=Object.keys(cnt).map(Number).map(function(v){return[v,cnt[v]]}).sort(function(a,b){return b[1]-a[1]||b[0]-a[0]});
  var ord=[];groups.forEach(function(g){for(var i=0;i<g[1];i++)ord.push(g[0])});
  if(fl&&st)return{rank:8,t:[st],name:st===14?'로열 플러시':'스트레이트 플러시',cards:cs};
  if(groups[0][1]===4)return{rank:7,t:ord,name:'포카드',cards:cs};
  if(groups[0][1]===3&&groups[1]&&groups[1][1]===2)return{rank:6,t:ord,name:'풀하우스',cards:cs};
  if(fl)return{rank:5,t:vals,name:'플러시',cards:cs};
  if(st)return{rank:4,t:[st],name:'스트레이트',cards:cs};
  if(groups[0][1]===3)return{rank:3,t:ord,name:'트리플',cards:cs};
  if(groups[0][1]===2&&groups[1]&&groups[1][1]===2)return{rank:2,t:ord,name:'투페어',cards:cs};
  if(groups[0][1]===2)return{rank:1,t:ord,name:'원페어',cards:cs};
  return{rank:0,t:vals,name:'하이카드',cards:cs};
}
function cmpHand(a,b){
  if(a.rank!==b.rank)return a.rank-b.rank;
  for(var i=0;i<Math.max(a.t.length,b.t.length);i++){
    var x=a.t[i]||0,y=b.t[i]||0;if(x!==y)return x-y;
  }
  return 0;
}
function bestHand(cs){
  if(cs.length<5)return null;
  var best=null,bestCombo=null;
  combos(cs).forEach(function(c){
    var e=eval5(c);
    if(!best||cmpHand(e,best)>0){best=e;bestCombo=c;}
  });
  if(best)best.bestCards=bestCombo;
  return best;
}

  if(hi.v>=12&&lo.v>=10&&s)return 0.70;
  if(hi.v>=12&&lo.v>=10)return 0.60;

}

// 포지션, GTO 핸드 레인지, 세미블러프, 슬로우플레이, 3-bet/4-bet, 블러프 캐치, 스택 깊이 반영

function positionBonus(pos){

  var bonusMap={'BTN':0.12,'BTN/SB':0.08,'CO':0.08,'HJ':0.03,'SB':-0.02,'BB':0.0,'UTG':-0.06};

// --- 드로우 감지 (AI용) ---
function detectDraws(cards,boardCards){
  if(boardCards.length<3)return{flush:false,oesd:false,gutshot:false,outs:0,comboD:false};
  var all=cards.concat(boardCards);
  var suits={};var vals={};
  all.forEach(function(c){suits[c.s]=(suits[c.s]||0)+1;vals[c.v]=(vals[c.v]||0)+1;});
  var flushDraw=false,oesd=false,gutshot=false,outs=0;
  // 플러시 드로우
  Object.keys(suits).forEach(function(s){if(suits[s]===4){flushDraw=true;outs+=9;}});
  // 스트레이트 드로우
  var uVals=Object.keys(vals).map(Number).sort(function(a,b){return a-b});
  if(uVals.indexOf(14)>-1)uVals.unshift(1); // A로우
  for(var i=0;i<=uVals.length-4;i++){
    var span=uVals[i+3]-uVals[i];
    var unique=[];
    for(var j=i;j<=i+3;j++){if(unique.indexOf(uVals[j])<0)unique.push(uVals[j]);}
    if(unique.length===4&&span===3){oesd=true;outs+=8;break;}
    if(unique.length===4&&span===4){gutshot=true;outs+=4;break;}
  }
  return{flush:flushDraw,oesd:oesd,gutshot:gutshot,outs:outs,comboD:flushDraw&&(oesd||gutshot)};
}

// --- 보드 텍스처 분석 ---
function analyzeBoardTexture(boardCards){
  if(boardCards.length<3)return{wet:false,paired:false,monotone:false,connected:false,scary:0};
  var suits={};var vals=[];
  boardCards.forEach(function(c){suits[c.s]=(suits[c.s]||0)+1;vals.push(c.v);});
  var maxSuit=Math.max.apply(null,Object.values(suits));
  var monotone=maxSuit>=3;
  var flushPossible=maxSuit>=3;
  vals.sort(function(a,b){return a-b});
  var connected=false;
  for(var i=0;i<vals.length-1;i++){if(vals[i+1]-vals[i]<=2)connected=true;}
  var cnt={};vals.forEach(function(v){cnt[v]=(cnt[v]||0)+1;});
  var paired=Object.values(cnt).some(function(c){return c>=2;});
  var scary=(flushPossible?1:0)+(connected?1:0)+(paired?1:0);
  return{wet:scary>=2,paired:paired,monotone:monotone,connected:connected,scary:scary};
}

// --- 프리플랍 핸드 레인지 (GTO 기반) ---
function gtoHandStrength(cards,pos){
  var a=cards.slice().sort(function(x,y){return y.v-x.v});
  var hi=a[0],lo=a[1];
  var p=hi.v===lo.v,s=hi.s===lo.s,g=Math.abs(hi.v-lo.v);
  var base=0;
  
  // 프리미엄 페어
  if(p&&hi.v>=13)base=0.97; // AA,KK
  else if(p&&hi.v===12)base=0.94; // QQ
  else if(p&&hi.v===11)base=0.90; // JJ
  else if(p&&hi.v===10)base=0.86; // TT
  else if(p&&hi.v>=8)base=0.78; // 99,88
  else if(p&&hi.v>=6)base=0.60; // 77,66
  else if(p&&hi.v>=4)base=0.50; // 55,44
  else if(p)base=0.42; // 33,22
  // AK
  else if(hi.v===14&&lo.v===13&&s)base=0.92;
  else if(hi.v===14&&lo.v===13)base=0.87;
  // AQ
  else if(hi.v===14&&lo.v===12&&s)base=0.83;
  else if(hi.v===14&&lo.v===12)base=0.78;
  // AJ
  else if(hi.v===14&&lo.v===11&&s)base=0.78;
  else if(hi.v===14&&lo.v===11)base=0.72;
  // AT
  else if(hi.v===14&&lo.v===10&&s)base=0.74;
  else if(hi.v===14&&lo.v===10)base=0.67;
  // A9-A2 suited
  else if(hi.v===14&&s)base=0.62+lo.v*0.005;
  // A9-A5 offsuit
  else if(hi.v===14&&lo.v>=5)base=0.52+lo.v*0.005;
  // A4-A2 offsuit
  else if(hi.v===14)base=0.40;
  // KQ
  else if(hi.v===13&&lo.v===12&&s)base=0.76;
  else if(hi.v===13&&lo.v===12)base=0.70;
  // KJ, KT suited
  else if(hi.v===13&&lo.v>=10&&s)base=0.70;
  else if(hi.v===13&&lo.v>=10)base=0.62;
  // QJ, QT suited
  else if(hi.v===12&&lo.v>=10&&s)base=0.66;
  else if(hi.v===12&&lo.v>=10)base=0.58;
  // JTs, T9s, 98s, 87s, 76s, 65s (suited connectors)
  else if(s&&g===1&&hi.v>=6)base=0.58+hi.v*0.005;
  else if(s&&g===1)base=0.42;
  // JTo, T9o
  else if(g===1&&hi.v>=10)base=0.48;
  // suited gappers
  else if(s&&g===2&&hi.v>=7)base=0.45;
  else if(s&&g<=3&&hi.v>=8)base=0.38;
  // K9-K5 suited
  else if(hi.v===13&&s)base=0.50;
  // broadways offsuit
  else if(hi.v>=11&&lo.v>=9)base=0.45;
  // 나머지
  else if(s)base=0.30;
  else if(hi.v>=10)base=0.28;
  else base=0.18;
  
  // 포지션 보너스 적용
  base+=positionBonus(pos);
  return Math.max(0.05,Math.min(0.99,base));
}

function aiDecide(p,need,pot,streetName){
  if(p.folded)return;
  if(p.stack<=0){p.action=p.action||'올인';return;}
  // === 난이도별 AI 행동 패턴 (P1) ===
  var diffConfig={
    easy:{mult:0.60,bluff:0.04,aggression:0.25,bluffCatch:0.15,semiBluff:0.10,slowPlay:0.05,cbet:0.30,heroRead:0.0},
    normal:{mult:1.00,bluff:0.15,aggression:0.45,bluffCatch:0.30,semiBluff:0.25,slowPlay:0.15,cbet:0.55,heroRead:0.20},
    hard:{mult:1.25,bluff:0.28,aggression:0.60,bluffCatch:0.45,semiBluff:0.40,slowPlay:0.25,cbet:0.70,heroRead:0.45},
    expert:{mult:1.45,bluff:0.40,aggression:0.75,bluffCatch:0.60,semiBluff:0.55,slowPlay:0.35,cbet:0.80,heroRead:0.70}
  }[aiDifficulty]||diffConfig.normal;
  var diffMult=diffConfig.mult;
  var diffBluff=diffConfig.bluff;
  
  var style=p.style||'TAG';
  var pIdx=players.indexOf(p);
  var pos=getAIPosition(pIdx);
  var blind=getBlindLevel();
  var BB=blind.bb;
  var stackBB=p.stack/BB; // 스택 깊이 (BB 단위)
  var r=Math.random();
  var ratio=need>0?need/p.stack:0;
  var callCost=Math.min(need,p.stack);
  var potOdds=callCost>0?callCost/(pot+callCost):0;
  var heroAggro=getHeroAggroFactor();
  
  // === 프리플랍 vs 포스트플랍 분기 ===
  var str, madeRank=0, draws, boardTex;
  
  if(board.length===0){
    // 프리플랍: GTO 기반 핸드 레인지
    str=gtoHandStrength(p.cards,pos);
    draws={flush:false,oesd:false,gutshot:false,outs:0,comboD:false};
    boardTex={wet:false,paired:false,monotone:false,connected:false,scary:0};
  } else {
    // 포스트플랍: 실제 핸드 강도 + 드로우 + 보드 텍스처
    str=gtoHandStrength(p.cards,pos); // 프리플랍 기본값
    var made=bestHand(p.cards.concat(board));
    if(made){
      madeRank=made.rank;
      // 더 정밀한 포스트플랍 강도 매핑
      var rankStr=[0.15, 0.40, 0.52, 0.62, 0.72, 0.78, 0.85, 0.92, 0.96, 0.99];
      str=Math.max(str,rankStr[madeRank]||0);
      // 탑페어+ 보너스 (카드 높을수록 강함)
      if(madeRank===1){
        var pairVal=0;
        var cnt={};p.cards.concat(board).forEach(function(c){cnt[c.v]=(cnt[c.v]||0)+1;});
        Object.keys(cnt).forEach(function(v){if(cnt[v]>=2)pairVal=Math.max(pairVal,Number(v));});
        if(pairVal>=Math.max.apply(null,board.map(function(c){return c.v;})))str+=0.08; // 탑페어
        if(p.cards.some(function(c){return c.v===pairVal;}))str+=0.05; // 홀카드로 만든 페어
      }
    }
    draws=detectDraws(p.cards,board);
    boardTex=analyzeBoardTexture(board);
    
    // 드로우 보너스 (세미블러프 기반)
    if(draws.comboD)str=Math.max(str,0.72); // 콤보 드로우 = 매우 강함
    else if(draws.flush)str=Math.max(str,0.58);
    else if(draws.oesd)str=Math.max(str,0.52);
    else if(draws.gutshot)str=Math.max(str,0.38);
  }
  
  // === 스타일별 기본 임계값 (포지션 반영) ===
  var foldTh,callTh,raiseTh,bluffProb,threeBetProb;
  if(style==='TAG'){
    foldTh=0.32;callTh=0.48;raiseTh=0.65;
    bluffProb=0.15;threeBetProb=0.20;
  } else if(style==='LAG'){
    foldTh=0.20;callTh=0.35;raiseTh=0.52;
    bluffProb=0.30;threeBetProb=0.35;
  } else { // TIGHT
    foldTh=0.42;callTh=0.58;raiseTh=0.75;
    bluffProb=0.06;threeBetProb=0.10;
  }
  
  // 포지션 조정: BTN/CO는 임계값 낮춤 (더 공격적)
  var posAdj=positionBonus(pos)*0.5;
  foldTh-=posAdj;callTh-=posAdj;raiseTh-=posAdj;
  
  // === 스택 깊이 조정 ===
  var isShortStack=stackBB<15;
  var isMedStack=stackBB>=15&&stackBB<40;
  var isDeepStack=stackBB>=40;
  
  if(isShortStack){
    // 숏스택: 푸시/폴드 전략 - 콜이 줄고 올인/폴드로 단순화
    foldTh+=0.08;
    raiseTh-=0.15; // 레이즈 임계값 낮춤 = 더 자주 올인
    bluffProb+=0.10; // 숏스택은 더 공격적
  }
  if(isDeepStack){
    // 딥스택: 더 신중하게
    callTh+=0.03;
  }
  
  // === 블러프 캐치 강화: 히어로가 공격적이면 AI는 더 많이 콜 ===
  var bluffCatchBonus=0;
  if(heroAggro>0.6)bluffCatchBonus=0.08;
  else if(heroAggro>0.4)bluffCatchBonus=0.04;
  else if(heroAggro>0.3)bluffCatchBonus=0.02;
  
  // === 블러프 판단 ===
  var isBluff=r<(bluffProb*diffMult); // 난이도에 따른 블러프 빈도 조절
  var effectiveStr=str;
  if(isBluff){
    // 블러프 시 가상 강도 부여
    effectiveStr=Math.max(str,0.68+Math.random()*0.15);
  }
  
  // === 슬로우플레이: 매우 강한 패은 가끔 체크/콜로 트랩 ===
  var isSlowPlay=false;
  if(madeRank>=6&&r<0.35)isSlowPlay=true; // 풀하우스+ 35%
  else if(madeRank===5&&r<0.20)isSlowPlay=true; // 플러시 20%
  else if(madeRank===7&&r<0.45)isSlowPlay=true; // 포카드 45%
  else if(madeRank>=8&&r<0.25)isSlowPlay=true; // 스트레이트플러시+ 25%
  // LAG는 슬로우플레이 더 자주
  if(style==='LAG'&&madeRank>=4&&r<0.30)isSlowPlay=true;
  
  // === 메인 의사결정 ===
  if(need===0){
    // --- 체크/베팅 상황 ---
    if(isSlowPlay){
      // 슬로우플레이: 체크로 트랩
      p.action='체크';p.round=0;
      return;
    }
    
    // C-Bet (컨티뉴에이션 베팅): 프리플랍 레이저가 플랍에서도 베팅
    var isCBetSpot=board.length===3&&streetName==='flop';
    
    if(effectiveStr>=raiseTh){
      // 강한 패: 큰 베팅
      var betSize=Math.min(Math.floor(pot*(0.6+Math.random()*0.4)/10)*10||BB*3,p.stack);
      if(isShortStack&&effectiveStr>=0.75)betSize=p.stack; // 숏스택 올인
      postBet_ai(p,betSize,'베팅');
    } else if(effectiveStr>=callTh){
      // 중간 패: 중간 베팅 또는 체크
      if(style==='LAG'||r<0.45||(isCBetSpot&&r<0.65)){
        var betSize2=Math.min(Math.floor(pot*(0.4+Math.random()*0.3)/10)*10||BB*2,p.stack);
        postBet_ai(p,betSize2,'베팅');
      } else {
        p.action='체크';p.round=0;
      }
    } else if(draws.outs>=8&&r<0.55){
      // 세미블러프: 드로우가 있으면 공격적 베팅
      var semiSize=Math.min(Math.floor(pot*(0.5+Math.random()*0.3)/10)*10||BB*2,p.stack);
      postBet_ai(p,semiSize,'베팅');
    } else if(draws.outs>=4&&r<0.30){
      // 거트샷 드로우로도 가끔 베팅
      var semiSize2=Math.min(Math.floor(pot*0.4/10)*10||BB*2,p.stack);
      postBet_ai(p,semiSize2,'베팅');
    } else if(isBluff&&(pos==='BTN'||pos==='CO')&&aliveCount()<=3){
      // 레이트 포지션 블러프 (상대 적을 때)
      var bluffSize=Math.min(Math.floor(pot*(0.5+Math.random()*0.3)/10)*10||BB*2,p.stack);
      postBet_ai(p,bluffSize,'베팅');
    } else {
      p.action='체크';p.round=0;
    }
  } else {
    // --- 콜/레이즈/폴드 상황 ---
    var adjStr=effectiveStr+bluffCatchBonus;
    
    // === 올인/큰 베팅 대응 (50%+ 스택) ===
    if(ratio>0.5){
      var shouldCall=false;
      
      // 강한 메이드 핸드
      if(madeRank>=3)shouldCall=true; // 트리플+
      else if(madeRank>=2&&potOdds<0.50)shouldCall=true; // 투페어 + 팟오즈 OK
      else if(madeRank>=1){
        // 원페어: 탑페어 이상이면 콜, 낮은 페어는 팟오즈 필요
        var pairVal2=0;
        var cnt2={};p.cards.concat(board).forEach(function(c){cnt2[c.v]=(cnt2[c.v]||0)+1;});
        Object.keys(cnt2).forEach(function(v){if(cnt2[v]>=2)pairVal2=Math.max(pairVal2,Number(v));});
        var boardMax=Math.max.apply(null,board.map(function(c){return c.v;}));
        if(pairVal2>=boardMax&&potOdds<0.48)shouldCall=true; // 탑페어
        else if(potOdds<0.35)shouldCall=true; // 낮은 페어도 팟오즈 좋으면
      }
      // 프리플랍 프리미엄
      else if(board.length===0&&str>=0.65)shouldCall=true;
      else if(board.length===0&&str>=0.50&&potOdds<0.38)shouldCall=true;
      // 강한 드로우
      else if(draws.comboD)shouldCall=true;
      else if(draws.flush&&potOdds<0.40)shouldCall=true;
      else if(draws.oesd&&potOdds<0.35)shouldCall=true;
      // 스타일별 추가 콜
      else if(style==='LAG'&&adjStr>=0.38&&r<0.50)shouldCall=true;
      else if(style==='TAG'&&adjStr>=0.48&&r<0.40)shouldCall=true;
      else if(style==='TIGHT'&&adjStr>=0.58&&r<0.30)shouldCall=true;
      // 블러프 캐치: 히어로가 매번 올인하면 더 많이 콜
      else if(heroAggro>0.5&&adjStr>=0.30&&r<0.40)shouldCall=true;
      else if(heroAggro>0.7&&r<0.30)shouldCall=true; // 극단적 어그로에는 약한 패도 콜
      // 숏스택 푸시: 스택 15BB 이하면 더 넓은 레인지로 콜
      else if(isShortStack&&str>=0.40)shouldCall=true;
      
      if(shouldCall){
        // 리레이즈 (매우 강한 패)
        if(madeRank>=5&&p.stack>need*2&&r<0.40){
          postBet_ai(p,p.stack,'올인');
        } else if(madeRank>=3&&p.stack>need*2&&r<0.25){
          var reraiseAmt=Math.min(need*2+Math.floor(pot*0.3/10)*10,p.stack);
          postBet_ai(p,reraiseAmt,'레이즈');
        } else {
          postBet_ai(p,need,'콜');
        }
      } else {
        p.folded=true;p.action='폴드';
      }
      
    // === 중간 베팅 (20~50% 스택) ===
    } else if(ratio>0.2){
      if(isSlowPlay&&madeRank>=5){
        // 슬로우플레이: 콜로 트랩
        postBet_ai(p,need,'콜');
      } else if(adjStr>=raiseTh){
        // 3-bet / 레이즈
        if(p.stack>need*2&&r<threeBetProb+0.15){
          var raiseAmt=Math.min(need*2.5+Math.floor(Math.random()*pot*0.3/10)*10,p.stack);
          if(isShortStack)raiseAmt=p.stack; // 숏스택 올인
          postBet_ai(p,raiseAmt,'레이즈');
        } else {
          postBet_ai(p,need,'콜');
        }
      } else if(adjStr>=callTh){
        // 콜
        postBet_ai(p,need,'콜');
      } else if(draws.outs>=8&&r<0.50){
        // 세미블러프 레이즈
        var semiRaise=Math.min(need+Math.floor(pot*0.5/10)*10,p.stack);
        postBet_ai(p,semiRaise,'레이즈');
      } else if(draws.outs>=4&&potOdds<0.30){
        // 거트샷도 팟오즈 좋으면 콜
        postBet_ai(p,need,'콜');
      } else if(adjStr>=foldTh){
        // 경계: 스타일에 따라
        if(style==='LAG'&&r<0.55)postBet_ai(p,need,'콜');
        else if(style==='TAG'&&r<0.40)postBet_ai(p,need,'콜');
        else if(r<0.25)postBet_ai(p,need,'콜');
        else{p.folded=true;p.action='폴드';}
      } else {
        // 블러프 캐치 보너스
        if(heroAggro>0.5&&r<0.25)postBet_ai(p,need,'콜');
        else{p.folded=true;p.action='폴드';}
      }
      
    // === 작은 베팅 (<20% 스택) ===
    } else {
      if(isSlowPlay&&madeRank>=5){
        // 슬로우플레이: 콜로 트랩
        postBet_ai(p,need,'콜');
      } else if(adjStr>=raiseTh){
        // 3-bet
        if(p.stack>need*2.5&&r<threeBetProb+0.20){
          var ra3=Math.min(need*3+Math.floor(Math.random()*pot*0.2/10)*10,p.stack);
          if(isShortStack)ra3=p.stack;
          postBet_ai(p,ra3,'레이즈');
        } else {
          postBet_ai(p,need,'콜');
        }
      } else if(adjStr>=callTh){
        postBet_ai(p,need,'콜');
      } else if(adjStr>=foldTh){
        // 경계 핸드: 대부분 콜 (작은 베팅이므로)
        if(r<0.65)postBet_ai(p,need,'콜');
        else{p.folded=true;p.action='폴드';}
      } else if(draws.outs>=4){
        // 드로우가 있으면 콜
        postBet_ai(p,need,'콜');
      } else {
        // 약한 패: 블러프 캐치 보너스 포함
        if(r<0.30+bluffCatchBonus*2)postBet_ai(p,need,'콜');
        else{p.folded=true;p.action='폴드';}
      }
    }
  }
}
function postBet_ai(p,amt,act){
  amt=Math.min(Math.max(0,amt),p.stack);
  if(amt<=0){p.action='체크';return;}
  p.stack-=amt;p.round=(p.round||0)+amt;pot+=amt;
  p.action=p.stack<=0?'올인':act;
  if(p.round>currentBet)currentBet=p.round;
}
function aiCallOrFoldAllIn(p,need){
  if(p.folded||p.stack<=0)return;
  var pIdx=players.indexOf(p);
  var pos=getAIPosition(pIdx);
  var str=gtoHandStrength(p.cards,pos);
  if(board.length>=3){
    var made=bestHand(p.cards.concat(board));
    if(made){
      var rankStr=[0.15,0.40,0.52,0.62,0.72,0.78,0.85,0.92,0.96,0.99];
      str=Math.max(str,rankStr[made.rank]||str);
    }
    var draws=detectDraws(p.cards,board);
    if(draws.comboD)str=Math.max(str,0.72);
    else if(draws.flush)str=Math.max(str,0.58);
    else if(draws.oesd)str=Math.max(str,0.52);
    else if(draws.gutshot)str=Math.max(str,0.38);
  }
  var potOdds=need>0?need/(pot+need):0;
  var style=p.style||'TAG';
  var buffer=style==='TIGHT'?0.18:style==='TAG'?0.10:0.04;
  if(need<=0){
    p.action='체크';
  } else if(str>=potOdds+buffer){
    postBet_ai(p,need,'콜');
  } else {
    p.folded=true;p.action='폴드';
  }
}
function settleAIBets(maxRounds){
  for(var round=0;round<maxRounds;round++){
    var needsAction=false;
    for(var i=1;i<players.length;i++){
      var p=players[i];
      if(p.folded||isEliminated(i)||p.stack<=0)continue;
      var pNeed=Math.max(0,currentBet-p.round);
      if(pNeed>0){
        needsAction=true;
        aiDecide(p,pNeed,pot,street);
      }
    }
    if(!needsAction||aliveCount()<=1)break;
  }
}

var aiDifficulty='normal'; // 'easy','normal','hard','expert'
function setDifficulty(d){
  aiDifficulty=d;
  showToast('AI 난이도: '+(d==='easy'?'쉬움':d==='normal'?'보통':d==='hard'?'어려움':'전문가'));
}
function initPlayers(){
  players=[
    {name:'나',stack:1000,cards:[],round:0,action:'',folded:false,isHero:true,style:'HERO'},
    {name:AI_NAMES[0],stack:1000,cards:[],round:0,action:'',folded:false,style:AI_STYLES[0]},
    {name:AI_NAMES[1],stack:1000,cards:[],round:0,action:'',folded:false,style:AI_STYLES[1]},
    {name:AI_NAMES[2],stack:1000,cards:[],round:0,action:'',folded:false,style:AI_STYLES[2]},
    {name:AI_NAMES[3],stack:1000,cards:[],round:0,action:'',folded:false,style:AI_STYLES[3]},
    {name:AI_NAMES[4],stack:1000,cards:[],round:0,action:'',folded:false,style:AI_STYLES[4]}
  ];
}

function newHand(resetAll){
  if(resetAll){
    initPlayers();
    dealer=players.length-1;
    smallBlindSeat=0;
    bigBlindSeat=1;
    tournamentHand=0;
    eliminatedPlayers=[];
    showToast('🏆 새 토너먼트 시작!','rgba(59,130,246,.95)');
    // 토너먼트 상태 저장
    try{localStorage.setItem('holdem_tourney_state',JSON.stringify({players:players.map(function(p){return{name:p.name,stack:p.stack,style:p.style}}),tournamentHand:tournamentHand,eliminated:eliminatedPlayers,difficulty:aiDifficulty}))}catch(e){}
  }
  
  // 핸드 시작 전 탈락 체크 (스택 0인 플레이어)
  players.forEach(function(p,i){
    if(i>0&&p.stack<=0&&!isEliminated(i)){
      eliminatedPlayers.push(i);
      showToast('💀 '+p.name+' 탈락!','rgba(239,68,68,.95)');
      playSound('eliminate');
    }
  });
  
  // 히어로 파산 체크
  if(players[0].stack<=0){
    showGameOver();
    return;
  }
  
  // 우승 체크 (나만 남음)
  if(activePlayerCount()<=1){
    showChampion();
    return;
  }
  
  var N=players.length;
  // 딜러 이동 (탈락자 건너뛰기)
  do{dealer=(dealer+1)%N;}while(isEliminated(dealer));
  
  // 블라인드 레벨
  var blind=getBlindLevel();
  var SB=blind.sb,BB=blind.bb;
  
  deck=makeDeck();
  board=[];street='preflop';pot=0;currentBet=0;handOver=false;
  players.forEach(function(p,i){
    p.cards=[];p.round=0;p.action='';
    p.folded=isEliminated(i); // 탈락자는 자동 폴드
  });
  
  // SB/BB 위치 (탈락자 건너뛰기, 헤즈업은 딜러가 SB)
  var activeN=activePlayerCount();
  var sb,bb;
  if(activeN===2){
    sb=dealer;
    bb=nextActiveSeat(dealer);
  } else {
    sb=nextActiveSeat(dealer);
    bb=nextActiveSeat(sb);
  }
  smallBlindSeat=sb;
  bigBlindSeat=bb;
  
  var sbAmt=Math.min(SB,players[sb].stack);
  var bbAmt=Math.min(BB,players[bb].stack);
  players[sb].stack-=sbAmt;players[sb].round=sbAmt;pot+=sbAmt;players[sb].action='SB';
  players[bb].stack-=bbAmt;players[bb].round=bbAmt;pot+=bbAmt;players[bb].action='BB';
  currentBet=bbAmt;
  
  // 카드 딜 (활성 플레이어만)
  playSound('card');
  for(var i=0;i<2;i++){
    players.forEach(function(p,idx){
      if(!isEliminated(idx))p.cards.push(deal());
    });
  }
  
  // AI 프리플랍 액션 (UTG부터, 탈락자 건너뛰기)
  var firstToAct=activeN===2?sb:nextActiveSeat(bb);
  var idx=firstToAct;
  for(var step=0;step<activeN;step++){
    if(idx!==0){
      var p=players[idx];
      if(!p.folded&&p.stack>0){
        var need=Math.max(0,currentBet-p.round);
        aiDecide(p,need,pot,'preflop');
      }
    }
    idx=nextActiveSeat(idx);
  }
  settleAIBets(3);
  
  tournamentHand++;
  handCount++;
  progress.hands++;
  saveProgress();
  
  var blindInfo=getBlindLevel();
  var lvlIdx=getBlindLevelIdx();
  var nextLvlIn=HANDS_PER_LEVEL-(tournamentHand%HANDS_PER_LEVEL);
  renderGame('카드를 확인하고 행동을 선택하세요.');
  updateTournamentUI();
  
  if(!progress.tutDone&&handCount===1){
    setTimeout(function(){showTutorial(0)},600);
  }

// ===== OUTS CALCULATION =====
function calcOuts(heroCards,boardCards){
  if(boardCards.length<3)return null;
  var all=heroCards.concat(boardCards);
  var suits={};var vals={};
  all.forEach(function(c){
    suits[c.s]=(suits[c.s]||0)+1;
    vals[c.v]=(vals[c.v]||0)+1;
  });
  var outs=0;var desc=[];
  
  // 플러시 드로우
  Object.keys(suits).forEach(function(s){
    if(suits[s]===4){outs+=9;desc.push('플러시 드로우(9)');}
  });
  
  // 스트레이트 드로우
  var uVals=Object.keys(vals).map(Number).sort(function(a,b){return a-b});
  var gaps=0;
  for(var i=1;i<uVals.length;i++){if(uVals[i]-uVals[i-1]<=2)gaps++;}
  if(uVals.length>=4&&gaps>=3){
    // 오픈 엔디드
    var isOESSD=false;
    for(var i=0;i<=uVals.length-4;i++){
      if(uVals[i+3]-uVals[i]===3){isOESSD=true;break;}
    }
    if(isOESSD){outs+=8;desc.push('오픈 스트레이트(8)');}
    else{outs+=4;desc.push('거트샷(4)');}
  }
  
  // 세트 드로우 (페어가 있을 때)
  var hasPair=Object.keys(vals).some(function(v){return vals[v]===2&&heroCards.some(function(c){return c.v===Number(v)})});
  if(hasPair&&outs===0){outs+=2;desc.push('세트 드로우(2)');}
  
  return{outs:outs,desc:desc.join(', ')};
}

  var made=board.length>=3?bestHand(hero.cards.concat(board)):null;
  var need=Math.max(0,currentBet-hero.round);
  var outsInfo=board.length>=3?calcOuts(hero.cards,board):null;
  
  // Opponents
  var oppHTML='';
  for(var i=1;i<players.length;i++){
    var p=players[i];
    var isDealer=i===dealer;
    var isSB=i===smallBlindSeat;
    var isBB=i===bigBlindSeat;

    var role=elim?'':getPositionLabel(i);
    var isActive=!p.folded&&!handOver&&!elim;

    if(isBB)oppHTML+='<div class="bb-badge">BB</div>';

    oppHTML+=renderCard(null,{back:true,sm:true,deal:false});
    oppHTML+='</div>';
    oppHTML+='<div class="opp-info">';
    oppHTML+='<div class="opp-name">'+p.name+'</div>';
    // AI 성향 배지 표시
    var styleInfo=AI_STYLE_DESC[p.style];
    if(styleInfo&&!p.folded){
      oppHTML+='<div class="opp-style" title="'+styleInfo.desc+'">'+styleInfo.emoji+' '+styleInfo.label+'</div>';
    }
    if(role)oppHTML+='<div class="opp-role">'+role+'</div>';
    oppHTML+='<div class="opp-stack">'+(elim?'탈락':fmt(p.stack))+'</div>';
    var actClass='opp-action';

    else if(p.action==='콜')actClass+=' act-call';
    else if(p.action==='레이즈'||p.action==='베팅')actClass+=' act-raise';
    else if(p.action==='체크')actClass+=' act-check';
    else if(p.action==='올인')actClass+=' act-allin';
    oppHTML+='<div class="'+actClass+'">'+p.action+'</div>';
    oppHTML+='</div>';
    var bet=p.round>0?p.round:0;
    oppHTML+='<div class="opp-bet'+(bet>0?' show':'')+'">'+fmt(bet)+'</div>';
    oppHTML+='</div>';
  }
  $('opponents').innerHTML=oppHTML;
  
  // Hero dealer button
  var heroIsDealer=dealer===0;
  
  // Board
  $('potVal').textContent=fmt(pot);
  $('streetLabel').textContent=street.toUpperCase();
  if(board.length>0){
    var bHTML='';
    board.forEach(function(c,idx){
      bHTML+=renderCard(c,{deal:idx===board.length-1&&street!=='preflop'});
    });
    // 빈 슬롯 채우기
    for(var s=board.length;s<5;s++)bHTML+='<div class="board-slot"></div>';
    $('boardCards').innerHTML=bHTML;
  } else {
    var slots='<div style="display:flex;gap:6px">';
    for(var s=0;s<5;s++)slots+='<div class="board-slot"></div>';
    slots+='</div>';
    $('boardCards').innerHTML=slots;
  }
  
  // Hero
  var heroIsSB=smallBlindSeat===0;
  var heroIsBB=bigBlindSeat===0;
  var heroPos=getPositionLabel(0);
  if(hero.cards.length>=2){
    var hHTML='';
    // 딜러/SB/BB 버튼은 heroCards 컨테이너 위에 절대 포지션으로 표시

    if(heroIsSB)hHTML+='<div class="sb-badge" style="position:absolute;top:-8px;left:'+(heroIsDealer?'14px':'-8px')+';z-index:10">SB</div>';

    hHTML+=renderCard(hero.cards[1],{deal:true});
    $('heroCards').innerHTML=hHTML;
  }
  
  var label=handLabel(hero.cards)+' · '+info.tier;
  // heroHandLabel에 포지션 배지 포함 (span 유지)
  var posTagEl=$('heroPosTag');
  if(posTagEl){posTagEl.textContent=heroPos;}
  // textContent 대신 firstChild 텍스트만 업데이트
  var hl=$('heroHandLabel');
  hl.childNodes[0].textContent=label;
  hl.style.color=info.color||'#fff';

  var str=handStrength(hero.cards);

  var strColor=str>=0.7?'#10b981':str>=0.45?'#f59e0b':'#ef4444';

  var madeStr=made?'현재 족보: '+made.name:'아직 공용 카드 없음';
  if(outsInfo&&outsInfo.outs>0){

    madeStr+=' · 아웃츠 '+outsInfo.outs+'장('+pct+'%)';
  }
  $('heroMade').textContent=madeStr;
  
  // 현재 패 배지 업데이트 (보드 카드 있을 때만)
  var handBadge=$('currentHandBadge');

    if(made){
      handBadge.textContent='🃏 '+made.name;
      handBadge.style.display='inline-block';
    } else {
      handBadge.style.display='none';
    }
  }
  $('heroStackVal').textContent=fmt(hero.stack);
  // 스택 위험 경고
  var stackEl=$('heroStackVal');

    stackEl.style.animation='pulse 1s ease-in-out infinite';

  // Coach tip
  var tipMsg=coachMsg||info.why;

  // 상대 핸드 추측 힌트 생성

      var hints=[];
      activeOpps.forEach(function(p){
        var sd=AI_STYLE_DESC[p.style];
        if(!sd)return;
        if(p.action==='레이즈'||p.action==='베팅'){

          else if(p.style==='LAG')hints.push(p.name+': 레이즈 → 블러프일 수도! 판단 필요');
          else hints.push(p.name+': 레이즈 → 매우 강한 패 확실 🚨');
        } else if(p.action==='콜'){
          if(p.style==='TAG')hints.push(p.name+': 콜 → 괜찮은 패, 아직 판단 중');

          if(p.style==='TAG')hints.push(p.name+': 체크 → 약한 패 or 슬로우플레이');

  $('qb4').onclick=function(){var amt=maxBet;if(amt>0){betAmount=amt;heroAct('bet');}};

    $('betBtn').style.background='linear-gradient(135deg,#16a34a,#15803d)';

// ===== HERO ACTION =====
function heroAct(action){
  if(handOver)return;
  var hero=players[0];
  if(hero.folded)return; // 폴드 후에는 어떤 액션도 불가
  var need=Math.max(0,currentBet-hero.round);
  
  $('betSliderWrap').classList.remove('show');
  $('betBtn').innerHTML='<span>베팅</span><small id="betTxt">+'+betAmount+'</small>';
  $('betBtn').style.background='';
  
  if(action==='fold'){
    hero.folded=true;hero.action='폴드';
    trackHeroAction('fold');
    playSound('fold');
    // 폴드 후 AI들끼리 남은 스트릿 자동 진행
    autoFinishAfterFold();
    return;
  } else if(action==='check'){
    if(need>0)return;
    hero.action='체크';hero.round=0;
    playSound('check');
  } else if(action==='call'){
    var callAmt=Math.min(need,hero.stack);
    hero.stack-=callAmt;hero.round+=callAmt;pot+=callAmt;
    hero.action=hero.stack<=0?'올인':'콜';
    if(hero.stack<=0)trackHeroAction('allin');
    playSound(hero.stack<=0?'allin':'chip');
  } else if(action==='bet'){
    var ba=betAmount;
    var total=need+ba;
    total=Math.min(total,hero.stack);
    if(total<=0){showToast('베팅할 칩이 부족합니다','rgba(239,68,68,.9)');return;}
    hero.stack-=total;hero.round+=total;pot+=total;
    currentBet=Math.max(currentBet,hero.round);
    hero.action=hero.stack<=0?'올인':need>0?'레이즈':'베팅';
    trackHeroAction(hero.stack<=0?'allin':'raise');
    playSound(hero.stack<=0?'allin':'chip');
  }
  
  // AI 반응
  if(action==='bet'){
    var heroAllInAfterAction=hero.stack<=0&&!hero.folded;
    for(var i=1;i<players.length;i++){
      var p=players[i];
      if(p.folded||isEliminated(i)||p.stack<=0)continue;
      var pNeed=Math.max(0,currentBet-p.round);
      if(pNeed>0){
        if(heroAllInAfterAction)aiCallOrFoldAllIn(p,pNeed);
        else aiDecide(p,pNeed,pot,street);
      }
    }
    if(!heroAllInAfterAction)settleAIBets(3);
  }
  
  if(currentBet>hero.round&&hero.stack>0&&aliveCount()>1){
    renderGame('상대가 레이즈했습니다. 콜, 폴드 또는 재레이즈를 선택하세요.');
    return;
  }
  
  if(hero.stack<=0&&!hero.folded){
    autoFinishAfterHeroAllIn();
    return;
  }
  
  if(aliveCount()<=1){
    finishFold();
  } else if(street==='river'){
    showdown();
  } else {
    nextStreet();
  }
  
  // 헤더 핸드 정보 업데이트
  var hi=$('hdrHandInfo');
  if(hi){
    var blind=getBlindLevel();
    hi.textContent='Lv.'+(getBlindLevelIdx()+1)+' · '+fmt(blind.sb)+'/'+fmt(blind.bb)+' · 핸드 '+tournamentHand;
  }
  if(!handOver){
    var made2=board.length>=3?bestHand(players[0].cards.concat(board)):null;
    var streetMsg={
      'flop':'플랍! 공용 카드 3장이 공개되었습니다.',
      'turn':'턴! 4번째 공용 카드입니다.',
      'river':'리버! 마지막 카드입니다. 최종 판단을 하세요.'
    }[street]||'카드를 확인하고 행동을 선택하세요.';
    var madeMsg=made2?' 현재 족보: <strong>'+made2.name+'</strong>':'';
    renderGame(streetMsg+madeMsg);
  }
}

function autoFinishAfterHeroAllIn(){
  if(aliveCount()<=1){
    finishFold();
    return;
  }
  while(street!=='river'){
    playSound('card');
    if(street==='preflop'){
      street='flop';
      board.push(deal(),deal(),deal());
    } else if(street==='flop'){
      street='turn';
      board.push(deal());
    } else if(street==='turn'){
      street='river';
      board.push(deal());
    } else {
      break;
    }
  }
  showdown();
}

// ===== AUTO FINISH AFTER HERO FOLD =====
function autoFinishAfterFold(){
  // 히어로 폴드 후 AI들끼리 자동 진행 → 쇼다운까지
  var aiAlive=players.filter(function(p,i){return i>0&&!p.folded&&!isEliminated(i)});
  if(aiAlive.length<=1){finishFold();return;}

  // 남은 스트릿 진행 (베팅은 간소화: AI 모두 체크로 진행)
  while(street!=='river'){
    if(street==='preflop'){street='flop';board.push(deal(),deal(),deal());}
    else if(street==='flop'){street='turn';board.push(deal());}
    else if(street==='turn'){street='river';board.push(deal());}
    aiAlive=players.filter(function(p,i){return i>0&&!p.folded&&!isEliminated(i)});
    if(aiAlive.length<=1){finishFold();return;}
  }
  showdown();
}

// ===== STREET PROGRESSION =====
function nextStreet(){
  if(aliveCount()<=1){finishFold();return;}
  players.forEach(function(p){p.round=0});
  currentBet=0;
  
  playSound('card');
  if(street==='preflop'){
    street='flop';
    board.push(deal(),deal(),deal());
  } else if(street==='flop'){
    street='turn';
    board.push(deal());
  } else if(street==='turn'){
    street='river';
    board.push(deal());
  } else {
    showdown();return;
  }
  
  // AI 포스트플랍 액션
  for(var i=1;i<players.length;i++){
    var p=players[i];
    if(p.folded||isEliminated(i)||p.stack<=0)continue;
    aiDecide(p,0,pot,street);
  }
  // AI 레이즈에 대한 다른 AI들의 리액션
  settleAIBets(2);
  if(aliveCount()<=1){finishFold();return;}
}

// ===== FINISH =====
function finishFold(){
  handOver=true;
  var alive=players.filter(function(p){return!p.folded});
  var winner;
  if(alive.length>0){
    winner=alive[0];
  } else {
    var lastAI=players.filter(function(p,i){return i>0}).pop();
    winner=lastAI||players[1];
  }
  winner.stack+=pot;
  // P1: 핸드 통계 기록
  recordHandStats(winner,players[0]);
  
  // 히어로가 폴드했으면 절대 승리 아님
  var isHeroWin=(winner===players[0])&&(!players[0].folded);
  
  // 스트릭 시스템
  if(isHeroWin){
    progress.streak=(progress.streak||0)+1;
    if(progress.streak>=(progress.maxStreak||0))progress.maxStreak=progress.streak;
    progress.wins++;progress.tableWins++;
  } else {
    progress.streak=0;
  }
  
  var bonusXP=0;
  if(isHeroWin&&progress.streak>=3){
    bonusXP=progress.streak>=5?50:25;
    showToast('🔥 '+progress.streak+'연승! +'+bonusXP+' 보너스 XP','linear-gradient(135deg,#f97316,#ef4444)');
  }
  var xp=(isHeroWin?50:15)+bonusXP;
  addXP(xp);
  saveProgress();
  
  if(isHeroWin)spawnChips(true);
  showResult(isHeroWin,winner,xp,true);
  renderGame('');
}

function showdown(){
  handOver=true;
  var alive=players.filter(function(p){return!p.folded});
  
  var results=alive.map(function(p){
    var hand=bestHand(p.cards.concat(board));
    return{player:p,hand:hand};
  });
  results.sort(function(a,b){return cmpHand(b.hand,a.hand)});
  
  // === WSOP 룰: 스플릿 팟 (무승부) 처리 ===
  // 동일한 핸드 강도를 가진 플레이어들을 찾음
  var winners=[results[0]];
  for(var i=1;i<results.length;i++){
    if(cmpHand(results[0].hand,results[i].hand)===0){
      winners.push(results[i]);
    } else {
      break;
    }
  }
  
  var isSplitPot=winners.length>1;
  var share=Math.floor(pot/winners.length);
  var remainder=pot-(share*winners.length); // 나머지 칩은 포지션 순서로 첫번째 승자에게 (WSOP 룰)
  
  winners.forEach(function(w,idx){
    var amt=share+(idx===0?remainder:0);
    w.player.stack+=amt;
  });
  
  // 히어로가 승자 중 하나인지 확인 (폴드한 히어로는 절대 승자 아님)
  var isHeroWin=(!players[0].folded)&&winners.some(function(w){return w.player===players[0]});
  // P1: 핸드 통계 기록
  recordHandStats(isHeroWin?players[0]:winners[0].player,players[0]);
  
  // 스트릭 시스템
  if(isHeroWin){
    progress.streak=(progress.streak||0)+1;
    if(progress.streak>=(progress.maxStreak||0))progress.maxStreak=progress.streak;
    progress.wins++;progress.tableWins++;
  } else {
    progress.streak=0;
  }
  
  var bonusXP=0;
  if(isHeroWin&&progress.streak>=3){
    bonusXP=progress.streak>=5?50:progress.streak>=3?25:0;
    if(bonusXP>0){
      showToast('🔥 '+progress.streak+'연승 스트릭! +'+bonusXP+' 보너스 XP','linear-gradient(135deg,#f97316,#ef4444)');
    }
  }
  var xp=(isHeroWin?80:20)+bonusXP;
  addXP(xp);
  saveProgress();
  
  if(isHeroWin)spawnChips(true);
  if(isSplitPot){
    showToast('⚖️ 스플릿 팟! '+winners.length+'명이 팟을 나눕니다 (각 '+fmt(share)+')','rgba(251,191,36,.95)');
  }
  showResult(isHeroWin,winners[0].player,xp,false,results,isSplitPot,winners);
  renderGame('');
}

// ===== HAND STATISTICS (P1) =====
function recordHandStats(winner,hero){
  if(!progress.handStats)progress.handStats=defaultProgress().handStats;
  var pos=getPositionLabel(0);
  var hs=progress.handStats;
  // Position stats
  if(hs.byPosition[pos]){
    hs.byPosition[pos].hands++;
    if(winner===hero)hs.byPosition[pos].wins++;
  }
  // Hand type stats
  var info=handInfo(hero.cards);
  var ht='weak';
  if(info.tier==='프리미엄'||info.tier==='강한 핸드')ht='premium';
  else if(info.tier==='수티드 커넥터'||info.tier==='에이스 하이')ht='playable';
  else if(info.tier==='경계 핸드')ht='marginal';
  hs.byHandType[ht].hands++;
  if(winner===hero)hs.byHandType[ht].wins++;
  // Street action stats
  var lastStreet='preflop';
  if(hero.folded){
    // Find which street hero folded
    // Simplified: use current street or preflop
    lastStreet=street==='preflop'?'preflop':street;
  }
  // Biggest pot
  if(pot>hs.biggestPot)hs.biggestPot=pot;
  if(winner===hero&&pot>hs.biggestWin)hs.biggestWin=pot;
  saveProgress();
}
