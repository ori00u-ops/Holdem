function showResult(isWin,winner,xp,isFold,showdownResults,isSplitPot,splitWinners){
  var heroIsFolded=players[0].folded;
  // 핵심 결정 코멘트 생성
  var decisionComment='';
  if(!heroIsFolded&&showdownResults&&showdownResults.length>0){
    var heroResult=showdownResults.find(function(r){return r.player.isHero;});
    var bestResult=showdownResults[0];
    if(heroResult&&bestResult){
      if(cmpHand(bestResult.hand,heroResult.hand)>0){
        var diff=bestResult.hand.rank-heroResult.hand.rank;
        if(diff>=2)decisionComment='💡 <strong>학습 포인트:</strong> 족보 차이가 컸습니다. 폴드를 고려할 수 있는 상황이었습니다.';
        else if(diff===1)decisionComment='💡 <strong>학습 포인트:</strong> 한 단계 차이의 족보였습니다. 상대의 베팅 패턴을 더 주의 깊게 보세요.';
        else decisionComment='💡 <strong>학습 포인트:</strong> 키커 차이로 패배했습니다. 타이트한 콜이 필요했을 수 있습니다.';
      }else{
        decisionComment='🎉 <strong>잘했습니다!</strong> 좋은 핸드로 밸류를 잘 받았습니다.';
      }
    }
  }else if(heroIsFolded){
    var heroHand=board.length>=3?bestHand(players[0].cards.concat(board)):null;
    if(heroHand&&heroHand.rank>=5)decisionComment='⚠️ <strong>복기:</strong> 폴드했지만 '+heroHand.name+'가 완성될 수 있었습니다. 드로우 상황이었나요?';
    else decisionComment='✅ 폴드는 손실을 제한하는 좋은 결정입니다.';
  }
  $('resultEmoji').textContent=heroIsFolded?'😔':isSplitPot&&isWin?'⚖️':isWin?'🏆':'😔';
  playSound((isWin&&!heroIsFolded)?'win':'lose');
  
  // 최종 핸드 이름을 결과 제목에 표시
  var heroFinalHand=board.length>=3?bestHand(players[0].cards.concat(board)):null;
  var winnerFinalHand=null;
  if(!isFold&&showdownResults&&showdownResults.length>0){
    winnerFinalHand=showdownResults[0].hand;
  }
  
  // 조사 처리 (받침 여부에 따라 '으로'/'로')
  function postfix(name){
    var last=name.charAt(name.length-1);
    // 한글 받침 확인
    if(last>='\uAC00'&&last<='\uD7A3'){
      return(last.charCodeAt(0)-0xAC00)%28>0?'으로':'로';
    }
    // 영어/기타 문자는 '로'
    return '로';
  }
  var heroDidFold=players[0].folded;
  if(heroDidFold){
    // 히어로가 폴드한 경우 - 절대 승리로 표시하지 않음
    $('resultTitle').textContent='폴드 — '+(winner.name||'AI')+' 승리';
  } else if(isSplitPot&&isWin){
    $('resultTitle').textContent='⚖️ 스플릿 팟! '+heroFinalHand.name+postfix(heroFinalHand.name)+' 무승부';
  } else if(isSplitPot&&!isWin){
    $('resultTitle').textContent='⚖️ 스플릿 팟 (패배)';
  } else if(isWin&&heroFinalHand){
    $('resultTitle').textContent=heroFinalHand.name+postfix(heroFinalHand.name)+' 승리!';
  } else if(isWin&&isFold){
    $('resultTitle').textContent='상대 폴드! 승리!';
  } else if(!isWin&&isFold){
    $('resultTitle').textContent='폴드';
  } else if(!isWin&&winnerFinalHand&&winnerFinalHand.name){
    $('resultTitle').textContent=winnerFinalHand.name+'에 패배';
  } else {
    $('resultTitle').textContent=isWin?'승리!':'패배';
  }
  $('resultTitle').style.color=(isWin&&!heroDidFold)?'#34d399':'#f87171';
  $('resultXP').textContent='+'+xp+' XP';
  
  // 팟 획득 정보 표시
  if(isSplitPot&&isWin){
    var heroWinnerIdx=splitWinners.findIndex(function(w){return w.player===players[0]});
    var myShare=Math.floor(pot/splitWinners.length)+(heroWinnerIdx===0?pot%splitWinners.length:0);
    $('resultSub').textContent='⚖️ 팟 '+fmt(pot)+' 중 '+fmt(myShare)+' 획득 (스플릿)';
    $('resultSub').style.color='var(--yellow2)';
  } else if(isSplitPot&&!isWin){
    $('resultSub').textContent='⚖️ 팟 '+fmt(pot)+' 스플릿 (미포함)';
    $('resultSub').style.color='#f87171';
  } else if(isWin){
    $('resultSub').textContent='팟 '+fmt(pot)+' 획득!';
    $('resultSub').style.color='var(--yellow2)';
  } else if(isFold){
    $('resultSub').textContent='팟 '+fmt(pot)+' 상실';
    $('resultSub').style.color='var(--txt3)';
  } else {
    $('resultSub').textContent='팟 '+fmt(pot)+' 상실';
    $('resultSub').style.color='#f87171';
  }
  
  // 스트릭 배지
  var streakEl=$('resultStreak');
  if(streakEl){
    if(isWin&&progress.streak>=2){
      streakEl.textContent='🔥 '+progress.streak+'연승!';
      streakEl.style.display='inline';
    } else {
      streakEl.style.display='none';
    }
  }
  
  // 보드는 각 플레이어의 7장 디스플레이에서 표시하므로 별도 보드 영역은 숨김
  $('resultBoardWrap').style.display='none';
  
  var sdHTML='';
  if(!isFold&&showdownResults&&showdownResults.length>0){
    sdHTML+='<div class="showdown-title">🃏 쇼다운 결과</div>';
    
    // 승리 이유 설명 (학습용)
    if(showdownResults.length>=2){
      var w=showdownResults[0], l=showdownResults[1];
      if(w.hand&&l.hand){
        var explain='';
        if(w.hand.rank!==l.hand.rank){
          explain=w.hand.name+' > '+l.hand.name+' (더 높은 족보)';
        } else {
          explain='같은 '+w.hand.name+' — 더 높은 카드(키커)로 승리';
        }
        sdHTML+='<div class="sd-explain">💡 '+explain+'</div>';
      }
    }
    
    // 상대 핸드 리딩 복기 (학습용)
    var readingReview=[];
    showdownResults.forEach(function(r){
      if(r.player.isHero)return;
      var sd=AI_STYLE_DESC[r.player.style];
      if(!sd||!r.hand)return;
      var lastAct=r.player.action||'';
      readingReview.push(r.player.name+' ('+sd.label+'): '+lastAct+' → 실제 패: <strong>'+r.hand.name+'</strong>');
    });
    if(readingReview.length>0){
      sdHTML+='<div class="sd-explain" style="background:rgba(139,92,246,.12);border-color:rgba(139,92,246,.3);color:#c4b5fd">🔍 핸드 리딩 복기<br>'+readingReview.join('<br>')+'</div>';
    }
    
    showdownResults.forEach(function(r,idx){
      var isW=idx===0;
      var bestIds=r.hand&&r.hand.bestCards?r.hand.bestCards.map(function(bc){return bc.id}):[];
      sdHTML+='<div class="showdown-player'+(isW?' winner':'')+'">';
      sdHTML+='<div class="sp-header">';
      sdHTML+='<span class="sp-name">'+(r.player.isHero?'🙋 나':r.player.name)+(isW?' 🏆':'')+' </span>';
      if(r.hand)sdHTML+='<span class="sp-hand-name">'+r.hand.name+'</span>';
      sdHTML+='</div>';
      // 홀카드 2장 + 보드 5장 = 7장 전체 표시
      sdHTML+='<div class="sp-7cards">';
      sdHTML+='<div class="sp-hole"><span class="sp-label">홀카드</span><div class="sp-cards">';
      r.player.cards.forEach(function(c){
        var inBest=bestIds.indexOf(c.id)>=0;
        sdHTML+=renderCard(c,{win:inBest,sm:true});
      });
      sdHTML+='</div></div>';
      sdHTML+='<span class="sp-plus">+</span>';
      sdHTML+='<div class="sp-board"><span class="sp-label">보드</span><div class="sp-cards">';
      board.forEach(function(c){
        var inBest=bestIds.indexOf(c.id)>=0;
        sdHTML+=renderCard(c,{win:inBest,sm:true});
      });
      sdHTML+='</div></div>';
      sdHTML+='</div>';
      sdHTML+='</div>';
    });
  } else if(isFold){
    sdHTML+='<div class="showdown-title">🃏 폴드 결과</div>';
    // 폴드 시 모든 상대방 카드 공개 + 핸드 이름 표시
    var foldAlive=players.filter(function(p){return!p.isHero});
    foldAlive.forEach(function(p){
      var isW=p===winner;
      var pHand=board.length>=3?bestHand(p.cards.concat(board)):null;
      sdHTML+='<div class="showdown-player'+(isW?' winner':'')+'">';
      sdHTML+='<div class="sp-header">';
      sdHTML+='<span class="sp-name">'+p.name+(isW?' 🏆 팟 획득':'')+' </span>';
      if(pHand)sdHTML+='<span class="sp-hand-name">'+pHand.name+'</span>';
      sdHTML+='</div>';
      sdHTML+='<div class="sp-cards">';
      p.cards.forEach(function(c){sdHTML+=renderCard(c)});
      sdHTML+='</div>';
      sdHTML+='</div>';
    });
    // 히어로 카드도 표시 + 핸드 이름
    var heroHand=board.length>=3?bestHand(players[0].cards.concat(board)):null;
    sdHTML+='<div class="showdown-player">';
    sdHTML+='<div class="sp-header">';
    sdHTML+='<span class="sp-name">🙋 나 (폴드)</span>';
    if(heroHand)sdHTML+='<span class="sp-hand-name">'+heroHand.name+'</span>';
    sdHTML+='</div>';
    sdHTML+='<div class="sp-cards">';
    players[0].cards.forEach(function(c){sdHTML+=renderCard(c)});
    sdHTML+='</div>';
    sdHTML+='</div>';
  }
  $('showdownWrap').innerHTML=sdHTML;
  
  var heroInfo=handInfo(players[0].cards);
  var coachMsg='';
  var heroFolded=players[0].folded;
  if(heroFolded){
    // 히어로가 폴드한 경우
    var winnerName=winner.name||'상대';
    if(winnerFinalHand){
      coachMsg=winnerName+'이(가) <strong>'+winnerFinalHand.name+'</strong>'+postfix(winnerFinalHand.name)+' 승리했습니다.<br>'+heroInfo.why;
    } else {
      coachMsg=winnerName+'이(가) 팟을 가져갔습니다.<br>'+heroInfo.why;
    }
  } else if(isWin&&heroFinalHand){
    coachMsg='<strong>'+heroFinalHand.name+'</strong>'+postfix(heroFinalHand.name)+' 승리했습니다! 🎉<br>'+heroInfo.why;
  } else if(isWin){
    coachMsg='잘 하셨습니다! '+heroInfo.why;
  } else if(!isWin&&winnerFinalHand&&winnerFinalHand.name){
    coachMsg='상대가 <strong>'+winnerFinalHand.name+'</strong>'+postfix(winnerFinalHand.name)+' 이겼습니다.<br>추천 행동: <strong>'+actKo(heroInfo.act)+'</strong> — '+heroInfo.why;
  } else {
    coachMsg='아쉽네요. 추천 행동: <strong>'+actKo(heroInfo.act)+'</strong> — '+heroInfo.why;
  }
  $('resultBody').innerHTML=coachMsg+(decisionComment?'<br><br>'+decisionComment:'');
  
  // 복기 저장 (최종 핸드 이름 포함)
  var review={
    hand:handLabel(players[0].cards),
    board:board.map(function(c){return (c.r==='T'?'10':c.r)+c.s}).join(' '),
    result:isWin?'win':isFold?'fold':'lose',
    info:heroInfo.tier,
    winner:winner.name||'나',
    pot:pot,
    finalHand:heroFinalHand?heroFinalHand.name:'',
    winnerHand:winnerFinalHand?winnerFinalHand.name:''
  };
  progress.reviews.unshift(review);
  if(progress.reviews.length>30)progress.reviews.pop();
  saveProgress();
  
  // 후원사 안내: 10핸드마다 1회, 게임 흐름 방해 최소화
  sponsorShownCount++;
  var showSponsor=(sponsorShownCount%20===0);
  $('resultSponsor').style.display=showSponsor?'block':'none';
  
  $('resultOverlay').classList.add('show');
  // 결과 카드 상단으로 스크롤
  setTimeout(function(){$('resultCard').scrollTop=0},100);
}

function hideResult(){
  $('resultOverlay').classList.remove('show');
}

function shareResult(){
  var lastHand=progress.reviews&&progress.reviews[0]?progress.reviews[0].finalHand:'';
  var handMsg=lastHand?' ('+lastHand+')':'';
  var txt='🃏 홀덤 도장에서 '+progress.wins+'승 달성!'+handMsg+' \n🏆 현재 '+getBeltName(progress.xp)+' | 연승 '+progress.streak+'\n\n나도 홀덤 실력 테스트 → https://holdem-brown.vercel.app\n\n#홀덤 #텍사스홀덤 #홀덤도장 #포커 #홀덤연습 #홀덤게임';
  if(navigator.share){
    navigator.share({title:'홀덤 도장 전적',text:txt,url:'https://holdem-brown.vercel.app'}).catch(function(){});
  }else{
    navigator.clipboard.writeText(txt).then(function(){showToast('클립보드에 복사되었습니다!');});
  }
}

function copyLink(){
  navigator.clipboard.writeText('https://holdem-brown.vercel.app').then(function(){showToast('링크가 복사되었습니다!');}).catch(function(){showToast('복사 실패');});
}

function getBeltName(xp){
  xp=typeof xp==='number'?xp:progress.xp;
  for(var i=BELT_XP.length-1;i>=0;i--){
    if(xp>=BELT_XP[i])return BELT_NAMES[i];
  }
  return BELT_NAMES[0];
}

  {c:'족보',q:'풀하우스(Full House)란?',a:3,cs:['같은 숫자 4장','같은 무늬 5장','숫자 5개 연속','트리플+페어'],why:'풀하우스는 같은 숫자 3장(트리플) + 다른 같은 숫자 2장(페어)의 조합입니다.'},
  {c:'베팅',q:'올인(All-in)이란?',a:1,cs:['가장 약한 베팅','가진 칩 전부를 베팅','체크와 같은 의미','상대 베팅의 2배'],why:'올인은 보유한 모든 칩을 베팅하는 것입니다. 스택이 부족할 때도 콜/베팅 가능합니다.'},
  {c:'상황판단',q:'블러핑(Bluffing)이란?',a:0,cs:['약한 패로 강한 척 베팅','강한 패로 약한 척','무조건 폴드','체크만 하는 것'],why:'블러핑은 약한 패를 가지고 강한 것처럼 베팅하여 상대를 폴드시키는 전략입니다.'},
  {c:'전략',q:'타이트(Tight) 플레이어의 특징은?',a:2,cs:['모든 핸드 플레이','자주 블러핑','강한 핸드만 선택적으로 플레이','항상 올인'],why:'타이트 플레이어는 강한 핸드만 선별해서 플레이합니다. 초보자에게 권장되는 스타일입니다.'},
  {c:'상황판단',q:'플랍에서 아무것도 맞지 않았을 때 최선의 행동은?',a:1,cs:['무조건 베팅','상황에 따라 체크 또는 폴드','항상 콜','항상 올인'],why:'플랍에서 아무것도 안 맞았다면 체크하거나, 상대가 베팅하면 폴드를 고려하세요. 드로우가 있다면 팟 오즈를 계산하세요.'},
  {c:'전략',q:'C-Bet(컨티뉴에이션 베팅)이란?',a:0,cs:['프리플랍 레이저가 플랍에서도 베팅','항상 콜하는 전략','블라인드를 두 배로 내는 것','상대 베팅을 따라가는 것'],why:'C-Bet은 프리플랍에서 레이즈한 플레이어가 플랍에서도 계속 베팅하는 전략입니다.'},
  {c:'기초룰',q:'스몰블라인드(SB)는 딜러 기준 몇 번째 왼쪽인가요?',a:0,cs:['첫 번째','두 번째','세 번째','네 번째'],why:'SB는 딜러 버튼 바로 왼쪽, BB는 SB 바로 왼쪽입니다.'},
  {c:'족보',q:'같은 족보일 때 승부를 가르는 것은?',a:2,cs:['무늬','카드 수','높은 카드(키커)','플레이어 순서'],why:'같은 족보일 때는 더 높은 숫자의 카드(키커)를 가진 플레이어가 이깁니다.'},
  {c:'전략',q:'아웃츠(Outs)란?',a:1,cs:['폴드한 카드 수','내 핸드를 완성시킬 남은 카드 수','팟의 크기','베팅 금액'],why:'아웃츠는 내 드로우를 완성시킬 수 있는 남은 덱의 카드 수입니다. 플러시 드로우는 9아웃츠입니다.'},
  {c:'전략',q:'룰 오브 4/2란?',a:3,cs:['4명이 플레이할 때의 규칙','2번 베팅 후 폴드','블라인드 계산법','아웃츠로 완성 확률을 빠르게 계산하는 방법'],why:'플랍에서는 아웃츠×4%, 턴에서는 아웃츠×2%가 대략적인 완성 확률입니다. 예: 9아웃츠 플러시 드로우 = 플랍에서 약 36%'}
];

  {c:'프리플랍',q:'UTG에서 가장 조심해야 하는 이유는?',a:1,cs:['블라인드를 내지 않아서','뒤에 행동할 플레이어가 많아서','항상 딜러라서','보드 카드를 볼 수 없어서'],why:'앞 포지션은 뒤에 남은 플레이어가 많아 강한 패를 만날 가능성이 큽니다.'},

  {c:'프리플랍',q:'AA로 프리플랍에서 보통 해야 할 행동은?',a:2,cs:['항상 체크','항상 폴드','레이즈 또는 리레이즈','무조건 콜만'],why:'AA는 강한 핸드이므로 팟을 키우고 상대에게 비싼 가격을 요구해야 합니다.'},
  {c:'프리플랍',q:'낮은 페어 22~66의 주된 목표는?',a:1,cs:['하이카드로 이기기','세트 맞추기','무늬로 이기기','항상 블러프하기'],why:'낮은 페어는 세트를 맞추면 강하지만, 못 맞추면 약해지는 경우가 많습니다.'},
  {c:'프리플랍',q:'앞에서 큰 레이즈가 있고 내 패가 KJo라면 초보자에게 가장 안전한 선택은?',a:3,cs:['무조건 올인','무조건 콜','작게 리레이즈','폴드 고려'],why:'KJo는 지배당하기 쉬운 핸드라 큰 레이즈 상대로 조심해야 합니다.'},
  {c:'프리플랍',q:'수티드 커넥터가 가장 좋아하는 상황은?',a:0,cs:['딥스택과 좋은 포지션','숏스택 올인 상황','항상 블라인드 포지션','상대가 모두 올인한 상황'],why:'수티드 커넥터는 implied odds가 필요하므로 딥스택과 포지션이 중요합니다.'},
  {c:'프리플랍',q:'3-Bet이란 무엇인가요?',a:2,cs:['세 명이 콜하는 것','세 번째 보드 카드','상대 레이즈에 다시 레이즈','블라인드의 3배를 무조건 베팅'],why:'오픈 레이즈가 나온 뒤 다시 레이즈하는 행동을 3-Bet이라고 합니다.'},
  {c:'프리플랍',q:'프리플랍에서 콜보다 폴드가 좋은 경우는?',a:1,cs:['포지션 좋고 강한 패','포지션 나쁘고 애매한 패','AA를 받았을 때','빅블라인드가 0일 때'],why:'나쁜 포지션의 애매한 핸드는 이후 스트릿에서 어려운 결정을 만듭니다.'},
  {c:'프리플랍',q:'AKo는 어떤 유형의 핸드인가요?',a:0,cs:['최상위 비페어 핸드','항상 약한 핸드','세트 마이닝 핸드','플러시 전용 핸드'],why:'AKo는 페어는 아니지만 높은 카드 두 장으로 매우 강한 시작 핸드입니다.'},

  {c:'포스트플랍',q:'A-7-2 레인보우 보드는 어떤 성격인가요?',a:0,cs:['드라이 보드','매우 젖은 보드','무조건 스트레이트 보드','항상 플러시 보드'],why:'연결성과 같은 무늬가 적어 드라이한 보드입니다.'},

  {c:'포스트플랍',q:'같은 무늬가 플랍에 3장 깔렸다면?',a:1,cs:['드로우가 전혀 없다','이미 플러시 가능성이 있다','페어가 불가능하다','하이카드가 항상 이긴다'],why:'모노톤 보드는 누군가 플러시를 완성했을 수 있어 신중해야 합니다.'},

  {c:'포스트플랍',q:'리버에서 플러시 드로우가 미완성이라면 그 드로우의 가치는?',a:0,cs:['0에 가깝다','턴보다 더 크다','항상 올인 가치','무조건 쇼다운 승리'],why:'리버에는 더 이상 카드가 나오지 않으므로 미완성 드로우는 승리 가치가 거의 없습니다.'},
  {c:'포스트플랍',q:'탑페어 탑키커가 가장 강하게 플레이하기 좋은 보드는?',a:1,cs:['J-T-9 같은 연결 보드','Q-7-2 레인보우 같은 드라이 보드','같은 무늬 4장 보드','4-5-6-7 보드'],why:'드라이 보드는 상대 드로우와 강한 조합이 적어 탑페어 가치가 높습니다.'},
  {c:'포스트플랍',q:'보드가 페어일 때 가능한 강한 족보는?',a:2,cs:['플러시만 가능','스트레이트만 가능','트립스 또는 풀하우스','하이카드만 가능'],why:'보드 페어는 트립스와 풀하우스 가능성을 만듭니다.'},
  {c:'포스트플랍',q:'플랍에서 내 패가 아무것도 없고 백도어만 있다면?',a:3,cs:['항상 콜','항상 올인','무조건 리레이즈','상대 액션과 가격을 보고 대부분 조심'],why:'백도어만으로 큰 금액을 따라가는 것은 장기적으로 손해입니다.'},
  {c:'포스트플랍',q:'강한 드로우로 베팅하는 전략을 무엇이라고 하나요?',a:0,cs:['세미블러프','슬로우롤','쇼다운 밸류','콜드콜'],why:'완성 전에는 블러프 성격이 있지만 완성될 가능성도 있는 베팅을 세미블러프라고 합니다.'},
  {c:'포스트플랍',q:'내가 체크하고 상대가 큰 베팅을 했을 때 가장 먼저 볼 것은?',a:2,cs:['상대 이름','카드 무늬 색','콜 가격과 내 승률','버튼 색깔'],why:'콜할 가격이 내 승률과 맞는지 먼저 계산해야 합니다.'},
  {c:'포스트플랍',q:'리버에서 내가 이기는 상대 패가 거의 없다면?',a:1,cs:['호기심으로 콜','폴드 고려','무조건 올인','항상 체크레이즈'],why:'리버의 콜은 실제로 이기는 패가 충분할 때만 수익적입니다.'},
  {c:'포스트플랍',q:'슬로우플레이가 가장 적합한 상황은?',a:3,cs:['매우 위험한 드로우 보드','약한 하이카드','상대가 절대 베팅하지 않을 때','내 패가 매우 강하고 상대가 베팅할 가능성이 높을 때'],why:'상대가 계속 베팅할 가능성이 있을 때 강한 패를 숨기는 가치가 생깁니다.'},

  {c:'베팅',q:'밸류 베팅의 목적은?',a:0,cs:['더 약한 패에게 콜을 받기','강한 패만 접게 하기','카드를 바꾸기','블라인드를 없애기'],why:'밸류 베팅은 내가 앞서 있을 때 더 약한 패로부터 칩을 받는 행동입니다.'},
  {c:'베팅',q:'블러프 베팅의 목적은?',a:2,cs:['항상 콜 받기','팟을 나누기','더 좋은 패를 접게 만들기','족보를 올리기'],why:'블러프는 현재 지고 있는 패를 접게 만드는 것이 목적입니다.'},
  {c:'베팅',q:'웨트 보드에서 강한 패로 크게 베팅하는 이유는?',a:1,cs:['상대에게 공짜 카드를 주려고','드로우에 비싼 가격을 주려고','내 패를 약하게 보이려고','팟을 줄이려고'],why:'상대 드로우가 싼 가격으로 따라오지 못하게 해야 합니다.'},
  {c:'베팅',q:'중간 강도의 패로 너무 크게 베팅하면 생기는 문제는?',a:3,cs:['약한 패가 많이 콜한다','항상 더 많은 XP를 얻는다','상대 카드가 공개된다','약한 패는 접고 강한 패만 남는다'],why:'중간 패로 큰 베팅은 더 나쁜 패를 몰아내고 더 좋은 패에게만 콜받기 쉽습니다.'},
  {c:'베팅',q:'체크레이즈는 어떤 행동인가요?',a:0,cs:['체크 후 상대 베팅에 레이즈','체크 후 폴드','레이즈 후 체크','콜 후 체크'],why:'먼저 체크한 뒤 상대 베팅에 다시 레이즈하는 강한 라인입니다.'},
  {c:'베팅',q:'팟 200에 콜 필요 50이면 팟 오즈는?',a:1,cs:['10%','20%','50%','80%'],why:'50 ÷ (200+50) = 20%입니다.'},
  {c:'베팅',q:'팟 300에 150을 베팅하면 대략 몇 팟 베팅인가요?',a:2,cs:['1/4팟','1/3팟','1/2팟','2팟'],why:'150은 300의 절반이므로 하프팟 베팅입니다.'},
  {c:'베팅',q:'상대가 절대 폴드하지 않는 유형이면 블러프는?',a:3,cs:['더 자주 해야 한다','항상 올인으로 해야 한다','무늬가 같을 때만 한다','줄이는 것이 좋다'],why:'콜링 스테이션 상대로는 블러프보다 밸류 베팅이 좋습니다.'},

// ===== PANELS =====
function openPanel(name){
  currentPanel=name;
  $('panelOverlay').classList.add('show');
  $('panels').classList.add('open');
  document.querySelectorAll('.nav-btn').forEach(function(b){
    b.classList.toggle('active',b.dataset.tab===name);
  });
  var content='';
  var title='';
  if(name==='learn'){
    title='📚 배우기';
    content=buildLearnContent();
    if(!progress.sawLearn){progress.sawLearn=1;saveProgress();}
  } else if(name==='quiz'){
    title='🧩 퀴즈';
    content=buildQuizContent();
  } else if(name==='growth'){
    title='🏅 성장';
    content=buildGrowthContent();
  } else if(name==='review'){
    title='📋 복기';
    content=buildReviewContent();
  }
  $('panelTitleText').textContent=title;
  $('panelContent').innerHTML=content;
  if(name==='quiz')bindQuizEvents();
}
function closePanel(){
  currentPanel=null;
  $('panelOverlay').classList.remove('show');
  $('panels').classList.remove('open');
  document.querySelectorAll('.nav-btn').forEach(function(b){
    b.classList.toggle('active',b.dataset.tab==='game');
  });
}
window.openPanel=openPanel;
window.closePanel=closePanel;

<strong>3-Bet 블러프 후보</strong>: A5s, A4s, A3s (너트 에이스)<br><br>

function buildHandChart(){
  var ranks=['A','K','Q','J','T','9','8','7','6','5','4','3','2'];
  var premium=['AA','KK','QQ','JJ','TT','AKs','AQs','AJs','ATs','KQs'];
  var strong=['99','88','AKo','AQo','AJs','ATs','A9s','KQo','KJs','KTs','QJs','JTs','T9s'];
  var playable=['77','66','55','AJo','ATo','A8s','A7s','A6s','A5s','KJo','KTo','QJo','QTs','JTo','98s','87s','76s','65s'];
  var marginal=['44','33','22','A9o','A8o','K9s','K8s','Q9s','J9s','T8s','97s','86s','75s','64s','54s'];
  
  var html='<div class="hand-chart">';
  for(var i=0;i<13;i++){
    for(var j=0;j<13;j++){
      var r1=ranks[i],r2=ranks[j];
      var hand;
      if(i===j)hand=r1+r2;
      else if(i<j)hand=r1+r2+'s';
      else hand=r2+r1+'o';
      
      var cls='hc-cell fold';
      if(premium.indexOf(hand)>=0)cls='hc-cell premium';
      else if(strong.indexOf(hand)>=0)cls='hc-cell strong';
      else if(playable.indexOf(hand)>=0)cls='hc-cell playable';
      else if(marginal.indexOf(hand)>=0)cls='hc-cell marginal';
      
      // 표시용: T를 10으로 변환
      var d1=r1==='T'?'10':r1, d2=r2==='T'?'10':r2;
      var label=i===j?d1:(i<j?d1+d2:d2+d1);
      html+='<div class="'+cls+'" title="'+hand+'">'+label+'</div>';
    }
  }
  html+='</div>';
  return html;
}

var quizFilter='all'; // 'all' or category name
function buildQuizContent(){
  // 필터된 퀴즈 목록
  var filteredQ=quizFilter==='all'?QUIZZES:QUIZZES.filter(function(q){return q.c===quizFilter});
  if(filteredQ.length===0)filteredQ=QUIZZES;
  var q=filteredQ[quizIdx%filteredQ.length];
  
  // 카테고리 필터 버튼
  var cats=['all'];
  QUIZZES.forEach(function(item){if(cats.indexOf(item.c)<0)cats.push(item.c);});
  var catLabels={all:'전체','기초룰':'기초','족보':'족보','베팅':'베팅','포지션':'포지션','전략':'전략','상황판단':'상황','돈관리':'돈관리','프리플랍':'프리플랍','포스트플랍':'포스트','토너먼트':'토너먼트','핸드리딩':'리딩','확률':'확률','멘탈':'멘탈'};
  var html='<div id="quizCatFilter" style="display:flex;gap:4px;overflow-x:auto;padding-bottom:6px;margin-bottom:10px;scrollbar-width:none">';
  cats.forEach(function(cat){
    var active=cat===quizFilter;
    html+='<button data-cat="'+cat+'" style="flex-shrink:0;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid '+(active?'var(--blue)':'var(--border2)')+';background:'+(active?'var(--blue)':'var(--bg3)')+';color:'+(active?'#fff':'var(--txt2)')+'">'+(catLabels[cat]||cat)+'</button>';
  });
  html+='</div>';
  
  html+='<div class="quiz-tag">'+q.c+'</div>';
  html+='<div class="quiz-q">'+q.q+'</div>';
  html+='<div class="quiz-opts">';
  q.cs.forEach(function(c,i){
    html+='<button class="quiz-opt" data-idx="'+i+'">'+c+'</button>';
  });
  html+='</div>';
  html+='<div class="quiz-why" id="quizWhy">💡 '+q.why+'</div>';
  html+='<button id="quizNextBtn">다음 문제 →</button>';
  var filtLen=(quizFilter==='all'?QUIZZES:QUIZZES.filter(function(x){return x.c===quizFilter})).length||QUIZZES.length;
  html+='<div class="quiz-progress">문제 '+(quizIdx%filtLen+1)+' / '+filtLen+'</div>';
  return html;
}
function bindQuizEvents(){
  // 퀴즈 필터 이벤트
  document.querySelectorAll('#quizCatFilter button').forEach(function(btn){
    btn.addEventListener('click',function(){
      quizFilter=btn.dataset.cat;
      quizIdx=0;
      openPanel('quiz');
    });
  });
  
  var filteredQ=quizFilter==='all'?QUIZZES:QUIZZES.filter(function(q){return q.c===quizFilter});
  if(filteredQ.length===0)filteredQ=QUIZZES;
  var q=filteredQ[quizIdx%filteredQ.length];
  var answered=false;
  document.querySelectorAll('.quiz-opt').forEach(function(btn){
    btn.addEventListener('click',function(){
      if(answered)return;
      answered=true;
      var idx=parseInt(btn.dataset.idx);
      var correct=idx===q.a;
      document.querySelectorAll('.quiz-opt').forEach(function(b,i){
        if(i===q.a)b.classList.add('correct');
        else if(i===idx&&!correct)b.classList.add('wrong');
      });
      $('quizWhy').classList.add('show');
      $('quizNextBtn').classList.add('show');
      if(correct){
        showToast('정답! +25 XP 🎉');
        addXP(25);
        progress.correct++;
        // 퀴즈 정답 기록
        progress.quizHistory=(progress.quizHistory||[]);
        progress.quizHistory.push({q:q.q,cat:q.c,correct:true,time:new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})});
        if(progress.quizHistory.length>50)progress.quizHistory.shift();
      } else {
        showToast('틀렸습니다 😅','rgba(239,68,68,.9)');
        progress.quizHistory=(progress.quizHistory||[]);
        progress.quizHistory.push({q:q.q,cat:q.c,correct:false,time:new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})});
        if(progress.quizHistory.length>50)progress.quizHistory.shift();
      }
      progress.quizTotal++;
      saveProgress();
    });
  });
  var nb=$('quizNextBtn');
  if(nb)nb.addEventListener('click',function(){
    quizIdx++;
    openPanel('quiz');
  });
}

  });

}

    heroAct('bet');
    wrap.classList.remove('show');
    $('betBtn').innerHTML='<span>베팅</span><small id="betTxt">+'+betAmount+'</small>';
    $('betBtn').style.background='';
  } else {
    wrap.classList.add('show');
    $('betBtn').innerHTML='<span>확인</span><small>베팅!</small>';
    $('betBtn').style.background='linear-gradient(135deg,#16a34a,#15803d)';
  }
});
$('betSlider').addEventListener('input',function(){
  betAmount=parseInt(this.value);
  $('betAmt').textContent=betAmount;
  var need=Math.max(0,currentBet-players[0].round);
  var total=need+betAmount;
  var bt=$('betTxt');if(bt)bt.textContent='+'+betAmount;
  // 슬라이더 열린 상태면 버튼 텍스트도 실시간 업데이트
  if($('betSliderWrap').classList.contains('show')){
    $('betBtn').innerHTML='<span>✅ 베팅 확정</span><small>총 '+total+'</small>';
  }
});
$('nextBtn').addEventListener('click',function(){
  newHand(false);
});
$('resultNextBtn').addEventListener('click',function(){
  hideResult();
  newHand(false);
});

panelEl.addEventListener('touchstart',function(e){panelStartY=e.touches[0].clientY},{ passive:true});
panelEl.addEventListener('touchend',function(e){

},{ passive:true});

$('beltBadge').addEventListener('click',function(){openPanel('growth')});


// ===== MULTIPLAYER 1v1 TURN-BASED (P2) =====
var mpState={mode:'solo',roomId:null,opponent:null,myTurn:false,lastAction:null};
var MP_STORE='holdem_mp_state';

function initMultiplayer(){
  mpState.mode='1v1';
  mpState.roomId='room_'+Math.random().toString(36).substr(2,8);
  mpState.myTurn=true;
  showToast('👥 1v1 모드: 상대방에게 링크를 공유하세요','rgba(59,130,246,.95)');
  // Generate shareable link
  var link='https://holdem-brown.vercel.app/?room='+mpState.roomId+'&side=2';
  if(navigator.clipboard){
    navigator.clipboard.writeText(link).then(function(){showToast('초대 링크 복사됨!');});
  }
  // Store in localStorage for sync (simplified - real impl needs server)
  localStorage.setItem(MP_STORE,JSON.stringify(mpState));
  renderGame('1v1 모드: 상대방이 입장할 때까지 대기 중...');
}

function checkMultiplayerRoom(){
  var url=new URL(window.location.href);
  var room=url.searchParams.get('room');
  var side=url.searchParams.get('side');
  if(room&&side==='2'){
    mpState.roomId=room;
    mpState.mode='1v1';
    mpState.myTurn=false;
    localStorage.setItem(MP_STORE,JSON.stringify(mpState));
    showToast('👥 1v1 모드: 상대방이 기다리고 있습니다','rgba(59,130,246,.95)');
    // Simplified: both players use same localStorage key for demo
    initPlayers();
    players=players.slice(0,2); // 1v1
    newHand(true);
    return true;
  }
  return false;
}

// Override for 1v1: only 2 players
function setup1v1(){
  AI_NAMES=['상대방'];
  AI_STYLES=['EXPERT'];
  initPlayers=function(){
    players=[
      {name:'나',stack:1000,cards:[],round:0,action:'',folded:false,isHero:true,style:'HERO'},
      {name:'상대방',stack:1000,cards:[],round:0,action:'',folded:false,style:'EXPERT'}
    ];
  };
}

window.initMultiplayer=initMultiplayer;
window.checkMultiplayerRoom=checkMultiplayerRoom;

// ===== INIT =====
updateBeltUI();
setTimeout(function(){
  var ls=$('loadingScreen');
  ls.classList.add('fade');
  setTimeout(function(){ls.style.display='none';},500);
  // 페이지 로드 시 저장된 토너먼트 복원
  var savedTourney=null;
  try{savedTourney=JSON.parse(localStorage.getItem('holdem_tourney_state')||'null');}catch(e){}
  var lastBust=parseInt(localStorage.getItem('holdem_lastBust')||'0');
  if(lastBust&&!canRecharge()&&!hasSharedForRecharge()){
    initPlayers();
    players[0].stack=0;
    showGameOver();
  } else if(savedTourney&&savedTourney.players&&savedTourney.players.length>0&&confirm('이전 토너먼트를 이어서 하시겠습니까?')){
    initPlayers();
    savedTourney.players.forEach(function(sp,i){
      if(players[i]){players[i].stack=sp.stack;players[i].style=sp.style;}
    });
    tournamentHand=savedTourney.tournamentHand||0;
    eliminatedPlayers=savedTourney.eliminated||[];
    aiDifficulty=savedTourney.difficulty||'normal';
    $('diffSelect').value=aiDifficulty;
    newHand(false);
  } else {
    newHand(true);
  }
},1200);

})();
