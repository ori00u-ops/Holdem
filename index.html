<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0f1e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="홀덤 도장">
<meta name="description" content="텍사스 홀덤 무료 연습 앱. 족보, 전략, 베팅 판단을 게임으로 익히세요.">
<title>홀덤 도장 🃏</title>
<style>
/* ===== RESET & BASE ===== */
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;width:100%;min-height:100%;background:#0a0f1e;color:#f0f4ff;font-family:'Noto Sans KR',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;-webkit-text-size-adjust:100%;overflow-x:hidden;touch-action:pan-y}
button{font:inherit;cursor:pointer;border:none;outline:none;touch-action:manipulation;-webkit-user-select:none;user-select:none}
a{color:inherit;text-decoration:none}
input[type=range]{-webkit-appearance:none;appearance:none}

/* ===== CSS VARIABLES ===== */
:root{
  --bg:#0a0f1e;
  --bg2:#111827;
  --bg3:#1a2540;
  --panel:#141d2f;
  --border:#1e2d4a;
  --border2:#2a3d5e;
  --txt:#f0f4ff;
  --txt2:#94a3b8;
  --txt3:#64748b;
  --green:#10b981;
  --green2:#34d399;
  --green3:#d1fae5;
  --yellow:#f59e0b;
  --yellow2:#fcd34d;
  --blue:#3b82f6;
  --blue2:#60a5fa;
  --red:#ef4444;
  --red2:#fca5a5;
  --purple:#8b5cf6;
  --orange:#f97316;
  --felt:#0d4a2a;
  --felt2:#0f5c33;
  --felt3:#0a3d22;
  --gold:#ffd700;
  --shadow:0 4px 24px rgba(0,0,0,.6);
  --radius:16px;
  --radius2:12px;
  --radius3:8px;
}

/* ===== LAYOUT ===== */
#app{display:flex;flex-direction:column;min-height:100dvh;max-width:480px;margin:0 auto;position:relative;overflow:hidden}

/* ===== HEADER ===== */
#header{
  background:linear-gradient(180deg,#0d1528 0%,transparent 100%);
  padding:env(safe-area-inset-top,12px) 16px 8px;
  display:flex;align-items:center;justify-content:space-between;
  position:relative;z-index:10;
  flex-shrink:0;
}
#header h1{font-size:20px;font-weight:900;letter-spacing:-.04em;margin:0;background:linear-gradient(135deg,#fff 0%,#94a3b8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-stats{display:flex;gap:8px;align-items:center}
.hdr-stat{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:4px}
.hdr-stat .ico{font-size:12px}
#beltBadge{background:linear-gradient(135deg,var(--yellow),var(--orange));color:#000;font-weight:900;font-size:11px;border-radius:20px;padding:4px 10px}

/* ===== POKER TABLE ===== */
#tableWrap{
  flex:1;
  display:flex;flex-direction:column;
  background:radial-gradient(ellipse 90% 80% at 50% 45%,var(--felt2) 0%,var(--felt) 50%,var(--felt3) 80%,#071a0e 100%);
  border-radius:0;
  position:relative;
  overflow:hidden;
  min-height:0;
}
#tableWrap::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 70% 60% at 50% 40%,rgba(255,255,255,.04) 0%,transparent 70%);
  pointer-events:none;
}

/* ===== OPPONENTS ===== */
#opponents{
  display:flex;justify-content:space-around;align-items:flex-start;
  padding:10px 8px 6px;
  gap:4px;
}
.opp{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  min-width:0;flex:1;max-width:110px;
  position:relative;
}
.opp-cards{display:flex;gap:3px;justify-content:center}
.opp-info{
  background:rgba(0,0,0,.55);
  border:1px solid rgba(255,255,255,.1);
  border-radius:10px;
  padding:4px 8px;
  text-align:center;
  min-width:0;width:100%;
}
.opp-name{font-size:10px;font-weight:800;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.opp-role{font-size:9px;color:var(--yellow2);font-weight:700}
.opp-stack{font-size:11px;font-weight:900;color:var(--green2)}
.opp-action{font-size:9px;color:var(--txt2);margin-top:1px}
.opp.folded{opacity:.35}
.opp.folded .opp-cards{filter:grayscale(1)}
.dealer-btn{
  position:absolute;top:-6px;right:2px;
  background:var(--yellow);color:#000;
  width:18px;height:18px;border-radius:50%;
  font-size:9px;font-weight:900;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 6px rgba(0,0,0,.5);
  z-index:2;
}
.opp-bet{
  position:absolute;bottom:-12px;left:50%;transform:translateX(-50%);
  background:var(--yellow);color:#000;
  border-radius:10px;padding:2px 6px;font-size:9px;font-weight:900;
  white-space:nowrap;
  display:none;
}
.opp-bet.show{display:block}

/* ===== BOARD ===== */
#boardArea{
  flex:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:8px 12px;
  gap:8px;
}
#potDisplay{
  background:rgba(0,0,0,.5);
  border:1px solid rgba(255,255,255,.15);
  border-radius:20px;
  padding:5px 16px;
  font-size:13px;font-weight:900;
  display:flex;align-items:center;gap:6px;
}
#potDisplay .pot-label{color:var(--txt2);font-size:10px;font-weight:700}
#potDisplay .pot-val{color:var(--yellow2);font-size:16px}
#boardCards{
  display:flex;gap:6px;justify-content:center;align-items:center;
  min-height:72px;
}
.board-placeholder{
  display:flex;gap:6px;
}
.board-slot{
  width:46px;height:66px;
  border:2px dashed rgba(255,255,255,.15);
  border-radius:8px;
  background:rgba(0,0,0,.2);
}

/* ===== CARDS ===== */
.card{
  width:46px;height:66px;
  background:#fff;
  border-radius:8px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  box-shadow:0 4px 12px rgba(0,0,0,.5),0 1px 3px rgba(0,0,0,.3);
  position:relative;
  overflow:hidden;
  flex-shrink:0;
}
.card::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.3) 0%,transparent 50%);
  pointer-events:none;
}
.card .rank{font-size:18px;font-weight:900;line-height:1;color:#1a1a2e}
.card .suit{font-size:14px;line-height:1;margin-top:1px}
.card.red .rank,.card.red .suit{color:#dc2626}
.card.back{
  background:linear-gradient(135deg,#1e3a5f 0%,#0f2040 100%);
  border:1px solid rgba(255,255,255,.1);
}
.card.back::before{
  content:'';position:absolute;inset:4px;
  border:1px solid rgba(255,255,255,.15);
  border-radius:4px;
  background:repeating-linear-gradient(45deg,transparent,transparent 3px,rgba(255,255,255,.03) 3px,rgba(255,255,255,.03) 6px);
}
.card.back .rank{display:none}
.card.back .suit{font-size:20px;color:rgba(255,255,255,.3)}
.card.sm{width:36px;height:52px}
.card.sm .rank{font-size:14px}
.card.sm .suit{font-size:11px}
.card.highlight{
  box-shadow:0 0 0 2px var(--yellow),0 4px 16px rgba(245,158,11,.4);
  transform:translateY(-3px);
}
.card.new{animation:cardDeal .3s ease-out}
@keyframes cardDeal{
  from{opacity:0;transform:scale(.5) rotate(-10deg) translateY(-20px)}
  to{opacity:1;transform:scale(1) rotate(0) translateY(0)}
}

/* ===== HERO AREA ===== */
#heroArea{
  background:rgba(0,0,0,.5);
  backdrop-filter:blur(10px);
  border-top:1px solid rgba(255,255,255,.08);
  padding:10px 12px 6px;
  display:flex;align-items:center;justify-content:space-between;
  gap:10px;
}
#heroCards{display:flex;gap:8px;align-items:center}
#heroInfo{flex:1;min-width:0}
#heroHandLabel{font-size:13px;font-weight:900;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#heroHandTier{font-size:11px;color:var(--green2);margin-top:1px}
#heroMade{font-size:10px;color:var(--txt2);margin-top:1px}
#heroStack{text-align:right}
#heroStack .stack-val{font-size:18px;font-weight:900;color:var(--yellow2)}
#heroStack .stack-label{font-size:9px;color:var(--txt2);font-weight:700}

/* ===== ACTION DOCK ===== */
#actionDock{
  background:var(--bg2);
  border-top:1px solid var(--border);
  padding:8px 12px;
  padding-bottom:calc(8px + env(safe-area-inset-bottom,0px));
  flex-shrink:0;
}

/* Street + Pot info */
#streetInfo{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:8px;
}
#streetBadge{
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:20px;padding:4px 12px;
  font-size:11px;font-weight:900;color:var(--blue2);
  letter-spacing:.05em;
}
#callInfo{font-size:12px;color:var(--txt2);font-weight:700}
#callInfo span{color:var(--yellow2);font-weight:900}

/* Coach tip */
#coachTip{
  background:var(--bg3);
  border:1px solid var(--border2);
  border-left:3px solid var(--green);
  border-radius:var(--radius3);
  padding:8px 12px;
  margin-bottom:8px;
  font-size:12px;line-height:1.5;
  color:var(--green3);
  display:flex;gap:8px;align-items:flex-start;
}
#coachTip .tip-icon{font-size:14px;flex-shrink:0;margin-top:1px}
#coachTip .tip-text{}
#coachTip strong{color:#fff}

/* Bet slider */
#betSliderWrap{
  display:none;
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:var(--radius2);
  padding:8px 12px;margin-bottom:8px;
  gap:8px;align-items:center;
}
#betSliderWrap.show{display:flex}
#betSlider{
  flex:1;height:4px;
  background:var(--border2);
  border-radius:4px;
  accent-color:var(--yellow);
}
#betSlider::-webkit-slider-thumb{width:20px;height:20px;border-radius:50%;background:var(--yellow);cursor:pointer}
#betAmt{font-size:14px;font-weight:900;color:var(--yellow2);min-width:50px;text-align:right}

/* Action buttons */
#actionBtns{
  display:grid;
  grid-template-columns:1fr 1fr 1fr 1fr;
  gap:6px;
}
.act-btn{
  border-radius:var(--radius2);
  padding:12px 6px;
  font-weight:900;font-size:14px;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  transition:transform .1s,opacity .1s;
  min-height:52px;
  position:relative;
  overflow:hidden;
}
.act-btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(255,255,255,.12) 0%,transparent 50%);
  pointer-events:none;
}
.act-btn:active{transform:scale(.95)}
.act-btn:disabled{opacity:.35;pointer-events:none}
.act-btn small{font-size:9px;font-weight:700;opacity:.8}
#foldBtn{background:linear-gradient(135deg,#374151,#1f2937);color:#f1f5f9}
#checkBtn{background:linear-gradient(135deg,#f8fafc,#e2e8f0);color:#0f172a}
#callBtn{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff}
#betBtn{background:linear-gradient(135deg,#d97706,#b45309);color:#fff}
#nextBtn{
  grid-column:1/-1;
  background:linear-gradient(135deg,var(--green),#059669);
  color:#fff;font-size:15px;
  display:none;
}
#nextBtn.show{display:flex}

/* ===== RESULT OVERLAY ===== */
#resultOverlay{
  position:absolute;inset:0;
  display:none;
  align-items:center;justify-content:center;
  z-index:50;
  background:rgba(0,0,0,.7);
  backdrop-filter:blur(4px);
}
#resultOverlay.show{display:flex}
#resultCard{
  background:var(--panel);
  border:1px solid var(--border2);
  border-radius:24px;
  padding:24px 20px;
  margin:20px;
  text-align:center;
  max-width:320px;
  width:100%;
  animation:popIn .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
#resultCard.win{border-color:rgba(16,185,129,.5);background:linear-gradient(135deg,rgba(16,185,129,.15),var(--panel))}
#resultCard.lose{border-color:rgba(239,68,68,.4);background:linear-gradient(135deg,rgba(239,68,68,.1),var(--panel))}
#resultCard.clear{border-color:rgba(245,158,11,.5);background:linear-gradient(135deg,rgba(245,158,11,.15),var(--panel))}
#resultEmoji{font-size:52px;margin-bottom:8px;display:block}
#resultTitle{font-size:22px;font-weight:900;margin-bottom:6px}
#resultCard.win #resultTitle{color:var(--green2)}
#resultCard.lose #resultTitle{color:var(--red2)}
#resultCard.clear #resultTitle{color:var(--yellow2)}
#resultBody{font-size:13px;color:var(--txt2);line-height:1.6;margin-bottom:16px}
#resultBody strong{color:var(--txt);display:block;margin-bottom:4px}
#resultNextBtn{
  background:linear-gradient(135deg,var(--green),#059669);
  color:#fff;border-radius:var(--radius2);
  padding:14px 32px;font-size:15px;font-weight:900;
  width:100%;
}
#resultXP{
  display:inline-flex;align-items:center;gap:4px;
  background:rgba(245,158,11,.2);border:1px solid rgba(245,158,11,.3);
  border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;color:var(--yellow2);
  margin-bottom:12px;
}

/* ===== BOTTOM NAV ===== */
#bottomNav{
  background:var(--bg2);
  border-top:1px solid var(--border);
  display:flex;
  padding-bottom:env(safe-area-inset-bottom,0px);
  flex-shrink:0;
  position:relative;z-index:20;
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:8px 4px;gap:3px;
  background:none;color:var(--txt3);
  font-size:9px;font-weight:700;
  transition:color .15s;
}
.nav-btn .nav-ico{font-size:20px;line-height:1}
.nav-btn.active{color:var(--green2)}
.nav-btn.active .nav-ico{filter:drop-shadow(0 0 6px var(--green))}

/* ===== PANELS ===== */
#panels{
  position:absolute;bottom:0;left:0;right:0;
  background:var(--bg2);
  border-top:2px solid var(--border2);
  border-radius:24px 24px 0 0;
  z-index:30;
  transform:translateY(100%);
  transition:transform .35s cubic-bezier(.32,.72,0,1);
  max-height:85dvh;
  display:flex;flex-direction:column;
  padding-bottom:env(safe-area-inset-bottom,0px);
}
#panels.open{transform:translateY(0)}
#panelHandle{
  width:40px;height:4px;background:var(--border2);
  border-radius:2px;margin:10px auto 0;flex-shrink:0;
}
#panelTitle{
  font-size:16px;font-weight:900;
  padding:12px 20px 8px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
#panelClose{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:50%;width:30px;height:30px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;color:var(--txt2);
}
#panelContent{
  overflow-y:auto;
  padding:0 16px 16px;
  flex:1;
  -webkit-overflow-scrolling:touch;
}

/* Panel content styles */
.section-title{font-size:14px;font-weight:900;color:var(--txt2);text-transform:uppercase;letter-spacing:.08em;margin:16px 0 8px}
.info-card{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--radius2);padding:12px 14px;margin-bottom:8px;
}
.info-card h4{margin:0 0 6px;font-size:14px;font-weight:900}
.info-card p{margin:0;font-size:12px;color:var(--txt2);line-height:1.6}
.info-card .tag{
  display:inline-block;border-radius:6px;padding:2px 7px;
  font-size:10px;font-weight:800;margin-bottom:6px;
}
.tag-premium{background:rgba(245,158,11,.2);color:var(--yellow2)}
.tag-good{background:rgba(16,185,129,.2);color:var(--green2)}
.tag-ok{background:rgba(59,130,246,.2);color:var(--blue2)}
.tag-fold{background:rgba(239,68,68,.2);color:var(--red2)}

/* Rank table */
.rank-row{
  display:grid;grid-template-columns:28px 1fr auto;
  gap:10px;align-items:center;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--radius2);padding:10px 12px;margin-bottom:6px;
}
.rank-num{
  width:26px;height:26px;border-radius:8px;
  background:var(--bg);border:1px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:900;color:var(--txt2);
}
.rank-row:first-child .rank-num{background:linear-gradient(135deg,var(--yellow),var(--orange));color:#000;border:none}
.rank-row:nth-child(2) .rank-num{background:linear-gradient(135deg,#c0c0c0,#94a3b8);color:#000;border:none}
.rank-row:nth-child(3) .rank-num{background:linear-gradient(135deg,#cd7f32,#92400e);color:#fff;border:none}
.rank-name{font-size:13px;font-weight:800}
.rank-desc{font-size:11px;color:var(--txt2);margin-top:2px}
.rank-example{font-size:11px;color:var(--txt3);font-style:italic}

/* Terms */
.term-row{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--radius2);padding:12px 14px;margin-bottom:6px;
  display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:start;
}
.term-word{
  background:var(--bg);border:1px solid var(--border2);
  border-radius:8px;padding:4px 10px;
  font-size:12px;font-weight:900;color:var(--blue2);
  white-space:nowrap;
}
.term-def{font-size:12px;color:var(--txt2);line-height:1.5}

/* Hand chart */
.chart-grid{display:grid;grid-template-columns:repeat(13,1fr);gap:2px;margin-bottom:12px}
.chart-cell{
  aspect-ratio:1;border-radius:3px;
  display:flex;align-items:center;justify-content:center;
  font-size:7px;font-weight:900;
  cursor:default;
}
.chart-cell.premium{background:#b45309;color:#fff}
.chart-cell.good{background:#1d4ed8;color:#fff}
.chart-cell.ok{background:#065f46;color:#fff}
.chart-cell.fold{background:#1f2937;color:#4b5563}
.chart-legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--txt2)}
.legend-dot{width:10px;height:10px;border-radius:3px}

/* Quiz */
.quiz-progress{
  background:var(--bg3);border-radius:4px;height:4px;margin-bottom:16px;overflow:hidden;
}
.quiz-progress-bar{height:100%;background:linear-gradient(90deg,var(--green),var(--blue));border-radius:4px;transition:width .3s}
.quiz-q{font-size:15px;font-weight:800;line-height:1.5;margin-bottom:16px;color:#fff}
.quiz-category{
  display:inline-block;background:var(--bg3);border:1px solid var(--border2);
  border-radius:20px;padding:3px 10px;font-size:10px;font-weight:700;color:var(--txt2);
  margin-bottom:10px;
}
.quiz-opt{
  display:block;width:100%;text-align:left;
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:var(--radius2);padding:12px 14px;
  margin-bottom:8px;font-size:13px;font-weight:700;color:var(--txt);
  transition:all .15s;
}
.quiz-opt:active{transform:scale(.98)}
.quiz-opt.correct{background:rgba(16,185,129,.2);border-color:var(--green);color:var(--green3)}
.quiz-opt.wrong{background:rgba(239,68,68,.15);border-color:var(--red);color:var(--red2)}
.quiz-why{
  background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);
  border-radius:var(--radius2);padding:12px 14px;
  font-size:12px;color:var(--green3);line-height:1.6;
  margin-top:8px;display:none;
}
.quiz-why.show{display:block}
.quiz-next{
  background:linear-gradient(135deg,var(--blue),#1d4ed8);
  color:#fff;border-radius:var(--radius2);
  padding:12px;font-size:14px;font-weight:900;
  width:100%;margin-top:8px;display:none;
}
.quiz-next.show{display:block}
.quiz-score{
  text-align:center;padding:20px;
}
.quiz-score .score-num{font-size:48px;font-weight:900;color:var(--yellow2)}
.quiz-score p{color:var(--txt2);font-size:13px}
.quiz-restart{
  background:linear-gradient(135deg,var(--green),#059669);
  color:#fff;border-radius:var(--radius2);
  padding:12px 24px;font-size:14px;font-weight:900;
  margin-top:12px;
}

/* Stages / Growth */
.stage-item{
  display:grid;grid-template-columns:40px 1fr auto;
  gap:10px;align-items:center;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--radius2);padding:12px;margin-bottom:8px;
}
.stage-item.done{border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.07)}
.stage-icon{
  width:38px;height:38px;border-radius:12px;

  display:flex;align-items:center;justify-content:center;
  font-size:18px;
}
.stage-item.done .stage-icon{background:linear-gradient(135deg,var(--green),#059669);border:none}
.stage-title{font-size:13px;font-weight:800}
.stage-desc{font-size:11px;color:var(--txt2);margin-top:2px}
.stage-pill{

}
.stage-item.done .stage-pill{background:rgba(16,185,129,.2);color:var(--green2)}
.stage-item:not(.done) .stage-pill{background:var(--bg);border:1px solid var(--border2);color:var(--txt3)}

/* Belt display */
.belt-display{
  background:linear-gradient(135deg,var(--bg3),var(--bg));
  border:1px solid var(--border2);border-radius:20px;
  padding:16px;text-align:center;margin-bottom:16px;
}
.belt-emoji{font-size:40px;margin-bottom:8px;display:block}
.belt-name{font-size:20px;font-weight:900}
.belt-xp{font-size:12px;color:var(--txt2);margin-top:4px}
.xp-bar{height:6px;background:var(--bg);border-radius:3px;margin-top:8px;overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--yellow),var(--orange));border-radius:3px;transition:width .5s}

/* Review */
.review-item{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--radius2);padding:10px 12px;margin-bottom:6px;
}
.review-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.review-hand{font-size:13px;font-weight:900}
.review-time{font-size:10px;color:var(--txt3)}
.review-result{font-size:11px;font-weight:700}
.review-result.win{color:var(--green2)}
.review-result.lose{color:var(--red2)}
.review-detail{font-size:11px;color:var(--txt2);line-height:1.5}

/* ===== STATS PANEL ===== */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.stat-card{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--radius2);padding:12px;text-align:center;
}
.stat-card .s-val{font-size:24px;font-weight:900;color:var(--txt)}
.stat-card .s-label{font-size:10px;color:var(--txt2);font-weight:700;margin-top:2px}

/* ===== ANIMATIONS ===== */
@keyframes chipFly{
  0%{transform:translate(0,0) scale(1);opacity:1}
  50%{transform:translate(var(--tx),var(--ty)) scale(.5);opacity:.8}
  100%{transform:translate(var(--tx2),var(--ty2)) scale(0);opacity:0}
}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%,60%{transform:translateX(-6px)}
  40%,80%{transform:translateX(6px)}
}
@keyframes glow{
  0%,100%{box-shadow:0 0 8px rgba(16,185,129,.4)}
  50%{box-shadow:0 0 20px rgba(16,185,129,.8)}
}
@keyframes slideUp{
  from{transform:translateY(20px);opacity:0}
  to{transform:translateY(0);opacity:1}
}
.shake{animation:shake .4s ease}
.glow{animation:glow 1.5s ease infinite}

/* ===== DESKTOP ===== */
@media(min-width:480px){

}
@media(min-width:900px){

/* ===== TOAST ===== */
#toast{
  position:fixed;top:env(safe-area-inset-top,20px);left:50%;transform:translateX(-50%) translateY(-80px);
  background:rgba(16,185,129,.95);color:#fff;
  border-radius:20px;padding:8px 20px;
  font-size:13px;font-weight:800;
  z-index:100;transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  white-space:nowrap;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
}
#toast.show{transform:translateX(-50%) translateY(0)}

/* ===== XP POPUP ===== */
.xp-popup{
  position:absolute;
  font-size:16px;font-weight:900;color:var(--yellow2);
  pointer-events:none;z-index:60;
  animation:xpFloat 1.2s ease-out forwards;
  text-shadow:0 2px 8px rgba(0,0,0,.5);
}
@keyframes xpFloat{
  0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-60px) scale(1.2)}
}

/* ===== LOADING ===== */
#loadingScreen{
  position:fixed;inset:0;background:#0a0f1e;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:200;transition:opacity .5s;
}
#loadingScreen.fade{opacity:0;pointer-events:none}
.loading-logo{font-size:48px;margin-bottom:16px;animation:pulse 1s ease infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.loading-text{font-size:18px;font-weight:900;color:var(--txt2)}

/* ===== CHIP ANIMATION ===== */
.chip{
  position:absolute;width:20px;height:20px;border-radius:50%;
  background:radial-gradient(circle,var(--yellow) 0%,var(--orange) 100%);
  border:2px solid rgba(255,255,255,.3);
  pointer-events:none;z-index:40;
  box-shadow:0 2px 6px rgba(0,0,0,.5);
}

/* ===== TUTORIAL OVERLAY ===== */
#tutorialOverlay{

  display:none;
  flex-direction:column;align-items:center;justify-content:flex-end;

#tutorialOverlay.show{display:flex}
.tutorial-card{

.tutorial-step{font-size:11px;color:var(--txt2);font-weight:700;margin-bottom:8px}

.tut-skip{flex:1;background:var(--bg3);border:1px solid var(--border2);color:var(--txt2);border-radius:var(--radius2);padding:12px;font-size:13px;font-weight:800}
.tut-next{flex:2;background:linear-gradient(135deg,var(--blue),#1d4ed8);color:#fff;border-radius:var(--radius2);padding:12px;font-size:14px;font-weight:900}
</style>
</head>

<script>
(function(){'use strict';

// ===== CONSTANTS =====

var deck=[],board=[],street='preflop',pot=0,currentBet=0,handOver=false;

// ===== QUIZ DATA =====
var QUIZZES=[
  {c:'기초룰',q:'텍사스 홀덤에서 각 플레이어에게 처음 주어지는 개인 카드는 몇 장인가요?',a:1,cs:['1장','2장','3장','5장'],why:'홀덤은 개인 카드 2장(홀 카드)과 공용 카드 5장으로 최고의 5장 조합을 만듭니다.'},
  {c:'족보',q:'다음 중 가장 강한 족보는?',a:0,cs:['스트레이트 플러시','포카드','풀하우스','플러시'],why:'스트레이트 플러시 > 포카드 > 풀하우스 > 플러시 순입니다. 로열 플러시는 스트레이트 플러시의 최고 버전입니다.'},
  {c:'족보',q:'투페어와 트리플 중 더 강한 것은?',a:1,cs:['투페어','트리플','같다','무늬가 높은 쪽'],why:'트리플(같은 숫자 3장)이 투페어(페어 2개)보다 강합니다.'},
  {c:'프리플랍',q:'AA, KK, QQ 같은 높은 페어는 어떤 시작 핸드인가요?',a:2,cs:['약한 핸드','항상 폴드','프리미엄 핸드','무조건 체크'],why:'높은 페어는 시작 핸드 최상위권입니다. 프리플랍에서 강하게 베팅해 팟을 키우는 것이 기본 전략입니다.'},
  {c:'상황판단',q:'아무것도 맞지 않았는데 상대가 크게 베팅했습니다. 초보에게 가장 안전한 행동은?',a:1,cs:['궁금하니 콜','상황에 따라 폴드','항상 올인','항상 리레이즈'],why:'초보는 애매한 상황에서 큰 팟을 피해야 합니다. 확신 없는 콜은 장기적으로 손해입니다.'},
  {c:'베팅',q:'체크(Check)의 의미는?',a:2,cs:['베팅을 올리는 것','패를 포기하는 것','추가 베팅 없이 다음으로 넘기는 것','상대 베팅을 따라가는 것'],why:'체크는 현재 베팅이 없을 때 추가 비용 없이 다음 단계로 넘기는 행동입니다.'},

  {c:'돈관리',q:'콜 필요액이 내 스택의 30% 이상이고 패도 약하다면?',a:3,cs:['무조건 콜','무조건 레이즈','앱 종료','폴드 고려'],why:'포커는 칩 관리 게임입니다. 약한 패로 큰 금액을 따라가면 장기적으로 무너집니다. 폴드도 실력입니다.'},

  {c:'기초룰',q:'빅블라인드(BB)의 역할은?',a:1,cs:['항상 마지막에 베팅','강제로 큰 블라인드 금액을 내는 포지션','딜러 역할','패스 가능'],why:'빅블라인드는 딜러 기준 두 번째 왼쪽 플레이어로, 강제로 정해진 금액(BB)을 내야 합니다.'},

// ===== TUTORIAL DATA =====

// ===== BELT =====
function getBeltIdx(){
  var x=progress.xp;
  for(var i=BELT_THRESHOLDS.length-1;i>=0;i--){if(x>=BELT_THRESHOLDS[i])return i}
  return 0;
}
function getBelt(){return BELT_NAMES[getBeltIdx()]}
function getBeltEmoji(){return BELT_EMOJI[getBeltIdx()]}

// ===== DECK =====
function makeDeck(){
  var d=[];
  SUITS.forEach(function(s){RANKS.forEach(function(r){d.push({r:r,s:s,v:RANK_VAL[r],id:r+s})})});
  for(var i=d.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),t=d[i];d[i]=d[j];d[j]=t}
  return d;
}

// ===== CARD RENDERING =====
function renderCard(c,opts){
  opts=opts||{};
  var sm=opts.small,back=opts.back,hi=opts.highlight,anim=opts.animate;
  if(back){
    return'<div class="card'+(sm?' sm':'')+(anim?' new':'')+' back"><span class="suit">◆</span></div>';
  }
  var red=c.s==='♥'||c.s==='♦';
  return'<div class="card'+(sm?' sm':'')+(red?' red':'')+(hi?' highlight':'')+(anim?' new':'')+'"><span class="rank">'+c.r+'</span><span class="suit">'+c.s+'</span></div>';
}

// ===== HAND EVALUATION =====
function combos(cs){
  var o=[];
  for(var a=0;a<cs.length-4;a++)for(var b=a+1;b<cs.length-3;b++)for(var c=b+1;c<cs.length-2;c++)for(var d=c+1;d<cs.length-1;d++)for(var e=d+1;e<cs.length;e++)o.push([cs[a],cs[b],cs[c],cs[d],cs[e]]);
  return o;
}
function straightTop(vals){
  var u=[];
  vals.slice().sort(function(a,b){return b-a}).forEach(function(v){if(u.indexOf(v)<0)u.push(v)});
  if(u.indexOf(14)>-1)u.push(1);
  for(var i=0;i<=u.length-5;i++){var sl=u.slice(i,i+5);if(sl[0]-sl[4]===4)return sl[0]===1?5:sl[0]}
  return 0;
}
function eval5(cs){
  var vals=cs.map(function(c){return c.v}).sort(function(a,b){return b-a});
  var fl=cs.every(function(c){return c.s===cs[0].s});
  var st=straightTop(vals);
  var cnt={};vals.forEach(function(v){cnt[v]=(cnt[v]||0)+1});
  var groups=Object.keys(cnt).map(Number).map(function(v){return[v,cnt[v]]}).sort(function(a,b){return b[1]-a[1]||b[0]-a[0]});
  var ord=[];groups.forEach(function(g){for(var i=0;i<g[1];i++)ord.push(g[0])});
  if(fl&&st)return{rank:8,t:[st],name:st===14?'로열 플러시':'스트레이트 플러시'};
  if(groups[0][1]===4)return{rank:7,t:ord,name:'포카드'};
  if(groups[0][1]===3&&groups[1]&&groups[1][1]===2)return{rank:6,t:ord,name:'풀하우스'};
  if(fl)return{rank:5,t:vals,name:'플러시'};
  if(st)return{rank:4,t:[st],name:'스트레이트'};
  if(groups[0][1]===3)return{rank:3,t:ord,name:'트리플'};
  if(groups[0][1]===2&&groups[1]&&groups[1][1]===2)return{rank:2,t:ord,name:'투페어'};
  if(groups[0][1]===2)return{rank:1,t:ord,name:'원페어'};
  return{rank:0,t:vals,name:'하이카드'};
}
function cmpHand(a,b){
  if(a.rank!==b.rank)return a.rank-b.rank;
  for(var i=0;i<Math.max(a.t.length,b.t.length);i++){var x=a.t[i]||0,y=b.t[i]||0;if(x!==y)return x-y}
  return 0;
}
function bestHand(cs){
  if(cs.length<5)return null;
  var best=null;
  combos(cs).forEach(function(c){var e=eval5(c);if(!best||cmpHand(e,best)>0)best=e});
  return best;
}

// ===== HAND INFO =====
function suited(cs){return cs[0].s===cs[1].s}
function isPair(cs){return cs[0].r===cs[1].r}
function handLabel(cs){
  var a=cs.slice().sort(function(x,y){return y.v-x.v});
  return a[0].r+a[1].r+(suited(cs)?'s':isPair(cs)?'':'o');
}
function handInfo(cs){
  var a=cs.slice().sort(function(x,y){return y.v-x.v}),hi=a[0],lo=a[1];
  var p=hi.v===lo.v,s=hi.s===lo.s,g=Math.abs(hi.v-lo.v);
  if(p&&hi.v>=11)return{tier:'프리미엄 핸드',act:'bet',score:95,why:'높은 페어! 팟을 키우세요. 강하게 베팅하는 것이 기본입니다.',color:'var(--yellow2)'};
  if(p&&hi.v>=8)return{tier:'중간 페어',act:'call',score:72,why:'중간 페어. 셋을 노리며 싸게 보는 것이 좋습니다.',color:'var(--green2)'};
  if(p)return{tier:'낮은 페어',act:'check',score:50,why:'낮은 페어. 무료로 볼 수 있으면 보고, 비싸면 폴드하세요.',color:'var(--blue2)'};
  if(hi.r==='A'&&['K','Q','J','T'].indexOf(lo.r)>-1&&s)return{tier:'수딧 브로드웨이',act:'bet',score:90,why:'A와 높은 카드 + 같은 무늬! 매우 강한 핸드입니다.',color:'var(--yellow2)'};
  if(hi.r==='A'&&['K','Q','J'].indexOf(lo.r)>-1)return{tier:'상위 브로드웨이',act:'bet',score:86,why:'A와 높은 카드 조합. 탑페어 싸움에서 강합니다.',color:'var(--yellow2)'};
  if(hi.r==='A'&&s)return{tier:'수딧 에이스',act:'call',score:62,why:'넛 플러시 가능성이 있습니다. 싸게 보는 쪽이 좋습니다.',color:'var(--green2)'};
  if(s&&g<=1&&hi.v>=8)return{tier:'수딧 커넥터',act:'call',score:66,why:'스트레이트+플러시 가능성! 싸게 볼 가치가 있습니다.',color:'var(--green2)'};
  if(s&&g<=2&&hi.v>=7)return{tier:'수딧 원갭',act:'check',score:55,why:'약한 수딧 핸드. 무료면 보고, 비싸면 폴드하세요.',color:'var(--blue2)'};
  if(hi.v>=12&&lo.v>=9)return{tier:'브로드웨이',act:'call',score:58,why:'높은 카드 조합. 좋아 보이지만 함정이 될 수 있습니다.',color:'var(--blue2)'};
  if(g>=4&&!s)return{tier:'약한 핸드',act:'fold',score:18,why:'두 카드가 서로 돕지 않습니다. 폴드가 이득입니다.',color:'var(--red2)'};
  return{tier:'경계 핸드',act:'check',score:42,why:'애매한 카드. 팟을 키우지 않는 게 기본입니다.',color:'var(--txt2)'};
}

// ===== AI LOGIC =====
function getAIAction(i){
  var p=players[i];
  if(p.fold||p.stack<=0)return null;
  var info=handInfo(p.cards);
  var need=toCall(i);
  var boardBonus=board.length>=3?bestHand(p.cards.concat(board)).rank*14:0;
  var power=info.score+boardBonus+Math.random()*20-10;
  // Bluff occasionally
  if(Math.random()<0.08)power+=30;
  if(need>0&&power<40){return'fold'}
  if(power>85&&p.stack>need+40){return'raise'}
  if(need>0){return'call'}
  if(power>70&&Math.random()<0.4){return'bet'}
  return'check';
}
function executeAI(i){
  var p=players[i];
  if(p.fold||p.stack<=0)return;
  var action=getAIAction(i);
  var need=toCall(i);
  if(action==='fold'){p.fold=true;p.last='폴드';return}
  if(action==='raise'){
    var amt=need+Math.floor((40+Math.random()*60)/10)*10;
    postBet(i,amt,'레이즈');currentBet=p.round;return;
  }
  if(action==='call'){postBet(i,need,'콜');return}
  if(action==='bet'){
    var ba=Math.floor((30+Math.random()*50)/10)*10;
    postBet(i,ba,'베팅');currentBet=p.round;return;
  }
  p.last='체크';
}

// ===== GAME LOGIC =====
function postBet(i,amt,label){
  var p=players[i];if(!p||p.stack<=0)return;
  var x=Math.min(amt,p.stack);
  p.stack-=x;p.round+=x;p.total+=x;pot+=x;p.last=label;
}
function toCall(i){return Math.max(0,currentBet-players[i].round)}
function aliveCount(){return players.filter(function(p){return!p.fold&&(p.stack>0||p.total>0)}).length}
function roleOf(i){
  var sb=(dealer+1)%4,bb=(dealer+2)%4;
  if(i===dealer)return'D';if(i===sb)return'SB';if(i===bb)return'BB';return'';
}

function newHand(resetStacks){
  deck=makeDeck();board=[];street='preflop';pot=0;currentBet=0;handOver=false;
  dealer=(dealer+1)%4;
  players=NAMES.map(function(n,i){
    var old=players[i];
    var st=resetStacks?1000:(old?old.stack:1000);
    return{name:n,cards:[deck.pop(),deck.pop()],stack:st,round:0,total:0,fold:st<=0,last:st<=0?'탈락':'대기'};
  });
  // Post blinds
  postBet((dealer+1)%4,10,'SB');
  postBet((dealer+2)%4,20,'BB');
  currentBet=20;
  // AI acts before hero
  for(var i=1;i<4;i++)executeAI(i);
  // Update bet slider max
  var heroStack=players[0].stack;
  var slider=$('betSlider');
  slider.max=heroStack;
  slider.value=Math.min(betAmount,heroStack);
  betAmount=parseInt(slider.value);
  $('betTxt').textContent='+'+betAmount;
  $('betAmt').textContent=betAmount;
  renderGame('아래 코치 팁을 보고 행동을 선택하세요.');
  hideResult();
}

function heroAct(action){
  if(handOver)return;
  var p=players[0];
  var need=toCall(0);
  var info=handInfo(p.cards);
  var matched=(info.act===action)||(info.act==='call'&&action==='check')||(info.act==='bet'&&action==='bet');
  if(action==='fold'){p.fold=true;p.last='폴드';finishFold('fold',matched);return}
  if(action==='call'){if(need>0)postBet(0,need,'콜');else p.last='체크'}
  if(action==='check'){p.last=need>0?'콜':'체크';if(need>0)postBet(0,need,'콜')}
  if(action==='bet'){
    var ba=betAmount;
    postBet(0,need+ba,need?'레이즈':'베팅');
    currentBet=p.round;
  }
  for(var i=1;i<4;i++)executeAI(i);
  if(aliveCount()<=1)finishFold(action,matched);
  else if(street==='river')showdown(action,matched);
  else nextStreet();
  if(!handOver){
    var made2=board.length>=3?bestHand(players[0].cards.concat(board)):null;
    var streetMsg=street==='flop'?'플랍! 공용 카드 3장이 공개되었습니다.':
      street==='turn'?'턴! 공용 카드 4장이 되었습니다.':
      '리버! 마지막 공용 카드입니다. 최종 판단을 하세요.';
    var madeMsg=made2?' 현재 족보: <strong>'+made2.name+'</strong>':'';
    renderGame(streetMsg+madeMsg);
  }
}

function nextStreet(){
  if(aliveCount()<=1){finishFold();return}
  players.forEach(function(p){p.round=0});currentBet=0;
  var newCards=[];
  if(street==='preflop'){newCards=[deck.pop(),deck.pop(),deck.pop()];street='flop'}
  else if(street==='flop'){newCards=[deck.pop()];street='turn'}
  else if(street==='turn'){newCards=[deck.pop()];street='river'}
  else{showdown();return}
  newCards.forEach(function(c){board.push(c)});
  for(var i=1;i<4;i++)executeAI(i);
}

function checkTableClear(){return players[0].stack>0&&players.slice(1).every(function(p){return p.stack<=0})}

function finishFold(action,matched){
  handOver=true;
  var winIdx=players.findIndex(function(p){return!p.fold&&(p.stack>0||p.total>0)});
  if(winIdx<0)winIdx=0;
  players[winIdx].stack+=pot;
  var won=winIdx===0;
  var xpGain=recordHand(action||'fold',won,matched);
  if(checkTableClear()){
    progress.tableWins++;progress.xp+=300;saveProgress();
    showResultOverlay('clear','🏆','테이블 클리어!',
      '<strong>모든 AI의 칩을 가져왔습니다!</strong><br>보너스 XP +300. 새 테이블로 리셋됩니다.',xpGain+300);
  } else {
    showResultOverlay(won?'win':'lose',won?'🎉':'😔',won?'승리!':'패배',
      '<strong>'+(won?'팟을 획득했습니다!':'상대가 팟을 가져갔습니다.')+'</strong><br>'+
      (won?players[winIdx].name+' (나)':'플레이어 '+players[winIdx].name)+' 팟 획득<br>'+
      '추천 행동: '+actKo(handInfo(players[0].cards).act),xpGain);
  }
  renderGame();
}

function showdown(action,matched){
  handOver=true;
  while(board.length<5)board.push(deck.pop());
  var bests=players.map(function(p){return p.fold?null:bestHand(p.cards.concat(board))});
  var win=0;
  for(var i=1;i<4;i++){if(!bests[i])continue;if(!bests[win]||cmpHand(bests[i],bests[win])>0)win=i}
  players[win].stack+=pot;
  var won=win===0;
  var xpGain=recordHand(action||'check',won,matched);
  if(checkTableClear()){
    progress.tableWins++;progress.xp+=300;saveProgress();
    showResultOverlay('clear','🏆','테이블 클리어!',
      '<strong>모든 AI의 칩을 가져왔습니다!</strong><br>보너스 XP +300',xpGain+300);
  } else {
    var myHand=bests[0]?bests[0].name:'폴드';
    var winHand=bests[win]?bests[win].name:'?';
    showResultOverlay(won?'win':'lose',won?'🎉':'😔',won?'승리!':'패배',
      '<strong>내 족보: '+myHand+'</strong><br>'+(won?'상대를 이겼습니다!':'상대 족보: '+winHand+'<br>'+players[win].name+' 승리')+
      '<br>추천 행동: '+actKo(handInfo(players[0].cards).act),xpGain);
  }
  renderGame();
}

function recordHand(action,won,matched){
  var info=handInfo(players[0].cards);
  if(matched===undefined)matched=(info.act===action)||(info.act==='call'&&action==='check');
  var gain=15+(won?30:0)+(matched?20:0);
  progress.xp+=gain;progress.hands++;
  if(won)progress.wins++;
  if(matched)progress.correct++;
  progress.reviews.unshift({
    t:new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}),
    h:handLabel(players[0].cards),
    board:board.map(function(c){return c.r+c.s}).join(' '),
    result:won?'win':'lose',
    matched:matched,
    myHand:board.length>=3?bestHand(players[0].cards.concat(board)).name:'프리플랍',
    action:action
  });
  progress.reviews=progress.reviews.slice(0,20);
  saveProgress();
  return gain;
}

function actKo(a){return a==='bet'?'베팅/레이즈':a==='call'?'콜':a==='fold'?'폴드':'체크'}

// ===== RENDER =====
function renderGame(coachMsg){
  var hero=players[0];
  var info=handInfo(hero.cards);
  var need=toCall(0);
  var made=board.length>=3?bestHand(hero.cards.concat(board)):null;

  // Header
  $('hdrXP').textContent=fmt(progress.xp);
  $('beltBadge').textContent=getBelt();

  // Opponents
  var oppHTML='';
  for(var i=1;i<4;i++){
    var p=players[i];
    var r=roleOf(i);
    oppHTML+='<div class="opp'+(p.fold?' folded':'')+'">';
    if(i===dealer)oppHTML+='<div class="dealer-btn">D</div>';
    oppHTML+='<div class="opp-cards">';
    oppHTML+=renderCard(p.cards[0],{small:true,back:!handOver});
    oppHTML+=renderCard(p.cards[1],{small:true,back:!handOver});
    oppHTML+='</div>';
    oppHTML+='<div class="opp-info">';
    oppHTML+='<div class="opp-name">'+p.name+'</div>';
    if(r)oppHTML+='<div class="opp-role">'+r+'</div>';
    oppHTML+='<div class="opp-stack">'+fmt(p.stack)+'</div>';
    oppHTML+='<div class="opp-action">'+p.last+'</div>';
    oppHTML+='</div>';
    if(p.total>0)oppHTML+='<div class="opp-bet show">'+fmt(p.total)+'</div>';
    oppHTML+='</div>';
  }
  $('opponents').innerHTML=oppHTML;

  // Board
  $('potVal').textContent=fmt(pot);
  $('streetLabel').textContent=street.toUpperCase();
  if(board.length>0){
    var boardHTML='';
    board.forEach(function(c,idx){
      var isNew=idx===board.length-1&&street!=='preflop';
      boardHTML+=renderCard(c,{animate:isNew});
    });
    $('boardCards').innerHTML=boardHTML;
  } else {
    var slots='<div class="board-placeholder">';
    for(var s=0;s<5;s++)slots+='<div class="board-slot"></div>';
    slots+='</div>';
    $('boardCards').innerHTML=slots;
  }

  // Hero area
  if(hero&&hero.cards&&hero.cards.length>=2){
    var heroCardsHTML=renderCard(hero.cards[0],{animate:false})+renderCard(hero.cards[1],{animate:false});
    $('heroCards').innerHTML=heroCardsHTML;
  }
  $('heroHandLabel').textContent=handLabel(hero.cards)+' · '+info.tier;
  $('heroHandLabel').style.color=info.color||'#fff';
  $('heroHandTier').textContent='';
  $('heroMade').textContent=made?'현재 족보: '+made.name:'아직 공용 카드 없음';
  $('heroStackVal').textContent=fmt(hero.stack);

  // Action dock
  $('streetBadge').textContent=street.toUpperCase();
  $('callAmt').textContent=fmt(need);
  $('callTxt').textContent=fmt(need);

  // Coach tip
  var tipMsg=coachMsg||info.why;
  var needStr=need>0?' (콜 필요: '+fmt(need)+')':'';
  var potOdds=need>0&&pot>0?Math.round(need/(pot+need)*100):0;
  var oddsStr=need>0?' · 팟 오즈 '+potOdds+'%':'';
  $('coachText').innerHTML='<strong>'+actKo(info.act)+'</strong> 추천'+needStr+oddsStr+'<br>'+tipMsg;

  // Buttons
  var over=handOver;
  $('foldBtn').disabled=over;
  $('checkBtn').disabled=over;
  $('callBtn').disabled=over||need===0;
  $('betBtn').disabled=over||hero.stack<=0;
  $('nextBtn').style.display=over?'flex':'none';
  $('nextBtn').classList.toggle('show',over);
}

function showResultOverlay(type,emoji,title,body,xp){
  var card=$('resultCard');
  card.className='';
  card.classList.add(type);
  $('resultEmoji').textContent=emoji;
  $('resultTitle').textContent=title;
  $('resultXP').textContent='+'+xp+' XP';
  $('resultBody').innerHTML=body;
  $('resultOverlay').classList.add('show');
  showXPPopup(xp,$('actionDock'));
  // Check belt up
  var oldBelt=getBelt();
  // already saved in recordHand
  var newBelt=getBelt();
  if(newBelt!==oldBelt){
    setTimeout(function(){showToast('🎉 벨트 승급! '+newBelt,'linear-gradient(135deg,#d97706,#b45309)')},800);
  }
}
function hideResult(){$('resultOverlay').classList.remove('show')}

// ===== PANEL SYSTEM =====
function openPanel(name){
  currentPanel=name;
  $('panels').classList.add('open');
  var titles={learn:'📚 배우기',quiz:'🧩 퀴즈',growth:'🏅 성장',review:'📋 복기'};
  $('panelTitleText').textContent=titles[name]||name;
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.toggle('active',b.dataset.panel===name)});
  renderPanel(name);
}
function closePanel(){
  $('panels').classList.remove('open');
  currentPanel=null;
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.toggle('active',b.dataset.panel==='game')});
}

function renderPanel(name){
  var c=$('panelContent');
  if(name==='learn')renderLearnPanel(c);
  else if(name==='quiz')renderQuizPanel(c);
  else if(name==='growth')renderGrowthPanel(c);
  else if(name==='review')renderReviewPanel(c);
}

function renderQuizPanel(c){
  var q=QUIZZES[quizIdx%QUIZZES.length];
  var pct=Math.round((quizIdx%QUIZZES.length)/QUIZZES.length*100);
  var html='';
  html+='<div class="quiz-progress"><div class="quiz-progress-bar" style="width:'+pct+'%"></div></div>';
  html+='<div class="quiz-category">'+q.c+'</div>';
  html+='<div class="quiz-q">'+q.q+'</div>';
  html+='<div id="quizOpts">';
  q.cs.forEach(function(opt,i){
    html+='<button class="quiz-opt" onclick="answerQuiz('+i+')">'+opt+'</button>';
  });
  html+='</div>';
  html+='<div class="quiz-why" id="quizWhy">💡 '+q.why+'</div>';
  html+='<button class="quiz-next" id="quizNextBtn" onclick="nextQuiz()">다음 문제 →</button>';
  html+='<div style="text-align:center;margin-top:12px;font-size:11px;color:var(--txt3)">문제 '+(quizIdx%QUIZZES.length+1)+' / '+QUIZZES.length+'</div>';
  c.innerHTML=html;
  quizAnswered=false;
}

window.answerQuiz=function(i){
  if(quizAnswered)return;
  quizAnswered=true;
  var q=QUIZZES[quizIdx%QUIZZES.length];
  var opts=document.querySelectorAll('.quiz-opt');
  opts.forEach(function(b,idx){
    b.disabled=true;
    if(idx===q.a)b.classList.add('correct');
    else if(idx===i&&i!==q.a)b.classList.add('wrong');
  });
  $('quizWhy').classList.add('show');
  $('quizNextBtn').classList.add('show');
  var correct=i===q.a;
  if(correct){
    progress.correct++;progress.quizTotal++;progress.xp+=25;saveProgress();
    showToast('정답! +25 XP 🎉');
    showXPPopup(25,$('panelContent'));
  } else {
    progress.quizTotal++;saveProgress();
    showToast('틀렸습니다. 해설을 확인하세요.','rgba(239,68,68,.9)');
  }
};

window.nextQuiz=function(){
  quizIdx++;
  renderPanel('quiz');
};

function renderGrowthPanel(c){
  var beltIdx=getBeltIdx();
  var nextXP=getNextBeltXP();
  var curXP=BELT_THRESHOLDS[beltIdx];
  var pct=nextXP?Math.round((progress.xp-curXP)/(nextXP-curXP)*100):100;

  var html='';
  html+='<div class="belt-display">';
  html+='<span class="belt-emoji">'+getBeltEmoji()+'</span>';
  html+='<div class="belt-name">'+getBelt()+'</div>';
  html+='<div class="belt-xp">'+fmt(progress.xp)+' XP'+(nextXP?' / '+fmt(nextXP)+' XP':'')+'</div>';
  html+='<div class="xp-bar"><div class="xp-fill" style="width:'+pct+'%"></div></div>';
  html+='</div>';

  html+='<div class="stats-grid">';
  html+='<div class="stat-card"><div class="s-val">'+fmt(progress.hands)+'</div><div class="s-label">총 핸드</div></div>';
  html+='<div class="stat-card"><div class="s-val">'+fmt(progress.wins)+'</div><div class="s-label">승리</div></div>';
  html+='<div class="stat-card"><div class="s-val">'+fmt(progress.correct)+'</div><div class="s-label">추천 일치</div></div>';
  html+='<div class="stat-card"><div class="s-val">'+fmt(progress.tableWins)+'</div><div class="s-label">테이블 클리어</div></div>';
  html+='</div>';

  var stageList=[
    {n:'📖',t:'족보 보기',d:'족보 순서 학습 완료',ok:progress.sawRanks},
    {n:'📝',t:'용어 익히기',d:'포커 용어 학습 완료',ok:progress.sawTerms},
    {n:'📊',t:'핸드차트 보기',d:'시작 핸드 기준 학습',ok:progress.sawChart},
    {n:'🧩',t:'퀴즈 5개 맞추기',d:'기초 퀴즈 통과',ok:progress.correct>=5},
    {n:'🃏',t:'10핸드 완료',d:'게임 경험 쌓기',ok:progress.hands>=10},
    {n:'🎯',t:'추천 10회 일치',d:'전략 감각 키우기',ok:progress.correct>=10},
    {n:'🏆',t:'테이블 클리어',d:'AI 모두 이기기',ok:progress.tableWins>=1},
    {n:'⚡',t:'XP 1000 달성',d:'꾸준한 연습',ok:progress.xp>=1000},
    {n:'🌟',t:'테이블 3회 클리어',d:'고수의 길',ok:progress.tableWins>=3}
  ];
  html+='<div class="section-title">성장 미션</div>';
  stageList.forEach(function(s){
    html+='<div class="stage-item'+(s.ok?' done':'')+'"><div class="stage-icon">'+(s.ok?'✓':s.n)+'</div><div><div class="stage-title">'+s.t+'</div><div class="stage-desc">'+s.d+'</div></div><div class="stage-pill">'+(s.ok?'완료':'진행중')+'</div></div>';
  });
  c.innerHTML=html;
}

function renderReviewPanel(c){
  var html='<div class="section-title">최근 핸드 기록</div>';
  if(!progress.reviews||progress.reviews.length===0){
    html+='<div class="info-card"><p>아직 플레이한 핸드가 없습니다. 게임을 시작하세요!</p></div>';
  } else {
    progress.reviews.forEach(function(r){
      html+='<div class="review-item">';
      html+='<div class="review-header"><span class="review-hand">'+r.h+'</span><span class="review-time">'+r.t+'</span></div>';
      html+='<div class="review-result '+(r.result==='win'?'win':'lose')+'">'+(r.result==='win'?'✅ 승리':'❌ 패배')+'</div>';
      html+='<div class="review-detail">';
      if(r.board)html+='보드: '+r.board+'<br>';
      if(r.myHand)html+='내 족보: '+r.myHand+'<br>';
      html+='추천 일치: '+(r.matched?'✅ 맞음':'❌ 다름');
      html+='</div></div>';
    });
  }
  c.innerHTML=html;
}

// ===== TUTORIAL =====
function showTutorial(){
  if(tutShown)return;
  tutStep=0;
  updateTutorial();
  $('tutorialOverlay').classList.add('show');
}
function updateTutorial(){
  var t=TUTORIALS[tutStep];
  $('tutStep').textContent=(tutStep+1)+' / '+TUTORIALS.length;
  $('tutTitle').textContent=t.title;
  $('tutBody').innerHTML=t.body;
  $('tutNext').textContent=tutStep<TUTORIALS.length-1?'다음 →':'시작하기!';
}
$('tutNext').addEventListener('click',function(){
  tutStep++;
  if(tutStep>=TUTORIALS.length){
    $('tutorialOverlay').classList.remove('show');
    progress.tutDone=true;tutShown=true;saveProgress();
  } else {
    updateTutorial();
  }
});
$('tutSkip').addEventListener('click',function(){
  $('tutorialOverlay').classList.remove('show');
  progress.tutDone=true;tutShown=true;saveProgress();
});

// ===== EVENT LISTENERS =====
$('foldBtn').addEventListener('click',function(){heroAct('fold')});
$('checkBtn').addEventListener('click',function(){heroAct('check')});
$('callBtn').addEventListener('click',function(){heroAct('call')});
$('betBtn').addEventListener('click',function(){
  var wrap=$('betSliderWrap');
  if(!wrap.classList.contains('show')){
    wrap.classList.add('show');
    $('betBtn').innerHTML='<span>확인</span><small>베팅!</small>';
    $('betBtn').style.background='linear-gradient(135deg,#16a34a,#15803d)';
    return;
  }
  heroAct('bet');
  wrap.classList.remove('show');
  $('betBtn').innerHTML='<span>베팅</span><small id="betTxt">+'+betAmount+'</small>';
  $('betBtn').style.background='';
});
function resetBetBtn(){
  $('betSliderWrap').classList.remove('show');
  $('betBtn').style.background='';
  $('betBtn').innerHTML='<span>베팅</span><small id="betTxt">+'+betAmount+'</small>';
}
$('nextBtn').addEventListener('click',function(){
  hideResult();
  resetBetBtn();
  newHand(checkTableClear());
});
$('resultNextBtn').addEventListener('click',function(){
  hideResult();
  resetBetBtn();
  newHand(checkTableClear());
});

$('betSlider').addEventListener('input',function(){
  betAmount=parseInt(this.value);
  $('betAmt').textContent=betAmount;
  var bt=$('betTxt');
  if(bt)bt.textContent='+'+betAmount;
});

// Swipe down to close panel
var panelStartY=0;
$('panels').addEventListener('touchstart',function(e){panelStartY=e.touches[0].clientY},{passive:true});
$('panels').addEventListener('touchend',function(e){
  var dy=e.changedTouches[0].clientY-panelStartY;
  if(dy>80)closePanel();
},{passive:true});

// ===== INIT =====
window.openPanel=openPanel;
window.closePanel=closePanel;

// Start loading
setTimeout(function(){
  $('loadingScreen').classList.add('fade');
  setTimeout(function(){$('loadingScreen').style.display='none'},500);
  newHand(true);
  if(!tutShown)showTutorial();
},800);

})();
